# Release Approval Gate — blocks PR merge until release is approved in DevAudit.
#
# Four-eyes release-approval gate for tracked releases. Independent hotfix PRs
# are intentionally excluded: they carry no tracked REQ release and must not
# be forced to create or approve a phantom bare-date release. When UAT-environment
# verification is configured for the project (sdlc-config.json `uat.enabled`),
# the human approver factors that into their review, but the gate itself is
# about the approval click — not the UAT-env exercise. Renamed from
# "UAT Approval Gate" in sdlc-v1.22.0; backend release status enum
# `uat_approved` is preserved for backwards-compat (renamed in v1.23.0).
#
# Generated by `devaudit install` / `devaudit update` from sdlc-config.json.
# Do not edit manually — re-run the CLI (`devaudit update`) to regenerate.
#
# Auth: project-scoped API key. Issue from DevAudit → Project
# Settings → API Keys (uploader role). Set as repo Secret
# DEVAUDIT_API_KEY. Base URL is read from sdlc-config.json
# devaudit.base_url; falls back to repo Variable DEVAUDIT_BASE_URL
# (deprecated, removed in v1.23.0).

name: Release Approval Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [release-approved]

permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: write

jobs:
  check-approval:
    name: DevAudit Release Approval
    # A hotfix goes directly to main under the documented exception path. It
    # remains subject to its full CI gates, but is not a tracked-release
    # promotion and therefore has no DevAudit approval record to resolve.
    if: >-
      github.event_name != 'pull_request' ||
      (!startsWith(github.event.pull_request.head.ref, 'hotfix/') &&
       !startsWith(github.event.pull_request.head.ref, 'fix/hotfix-'))
    runs-on: ubuntu-latest
    env:
      DEVAUDIT_BASE_URL_VAR: ${{ vars.DEVAUDIT_BASE_URL }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}
      PROJECT_SLUG: wgb

    steps:
      - uses: actions/checkout@v6
        with:
          # The default `pull_request` checkout is a synthetic merge commit
          # with an empty body, so `derive-release-version.sh` can't see the
          # `[REQ-XXX]` tag on the integration-side commit. Pull the head
          # commit directly + full history so the same derivation script the
          # uploaders use (compliance-evidence.yml, ci.yml's register-release)
          # produces the same release identity here (#81 — release-identity
          # coherence; was hardcoded to `v$(date +%Y.%m.%d)` which never
          # matched the `REQ-XXX` records the uploaders wrote).
          #
          # devaudit#283 — repository_dispatch events don't have a
          # pull_request payload. Fall back to the develop branch ref so
          # the gate can resolve the release and post a status check.
          ref: ${{ github.event.pull_request.head.sha || 'develop' }}
          fetch-depth: 0

      - name: Resolve DevAudit base URL
        run: |
          # Prefer sdlc-config.json (visible in PR review) over repo Variable.
          CONFIG_URL=""
          if [ -f sdlc-config.json ]; then
            CONFIG_URL=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          fi
          if [ -n "$CONFIG_URL" ]; then
            BASE="$CONFIG_URL"
            echo "Using devaudit.base_url from sdlc-config.json: $BASE"
          elif [ -n "$DEVAUDIT_BASE_URL_VAR" ]; then
            BASE="$DEVAUDIT_BASE_URL_VAR"
            echo "::warning::Using repo Variable DEVAUDIT_BASE_URL (deprecated in v1.23.0). Move base_url to sdlc-config.json devaudit.base_url for PR-visible config."
          else
            echo "::error::No DevAudit base URL configured. Set devaudit.base_url in sdlc-config.json."
            exit 1
          fi
          # Bootstrap mode (#301): the first PR introducing the SDLC framework
          # can't pass the gate that the framework introduces. If the API key
          # secret isn't set yet, fall through with a notice — gate passes,
          # enforcement kicks in once the secret is configured AND the project
          # is auto-created by the first compliance-evidence.yml run.
          if [ -z "${DEVAUDIT_API_KEY}" ]; then
            echo "::notice::DEVAUDIT_API_KEY not set — bootstrap mode. Gate passes. Configure the secret after the first compliance-evidence.yml run initialises ${PROJECT_SLUG} in DevAudit; enforcement starts on the next PR after that."
            echo "BOOTSTRAP_MODE=true" >> "$GITHUB_ENV"
            exit 0
          fi
          # Pre-flight: confirm destination is reachable. Catches dead aliases / wrong hosts early.
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 -I "${BASE%/}/" || echo "000")
          case "$CODE" in
            2*|3*) echo "DevAudit reachable at ${BASE} (HTTP ${CODE})" ;;
            *) echo "::error::DevAudit base URL ${BASE} returned HTTP ${CODE}. Likely a stale alias or wrong host. Check sdlc-config.json devaudit.base_url."; exit 1 ;;
          esac
          # Bootstrap probe (#301): project may not exist in DevAudit yet —
          # the first compliance-evidence.yml run auto-creates it. A 404 here
          # means we're on the introducing PR; pass with a warning. 401/403
          # means the API key is invalid → fail (not bootstrap).
          #
          # Defense in depth (#74): if /api/ci/projects/<slug> 404s we
          # cross-check against /api/ci/releases/resolve — a known-good
          # read endpoint scoped to the same project. If THAT returns 2xx
          # the project clearly exists, and the projects-endpoint 404 is a
          # portal-side bug. Failing closed beats silently passing the
          # four-eyes gate. The original "GET /api/ci/projects/<slug>"
          # endpoint didn't exist on the portal before metasession-dev/
          # devaudit#NN, so this exact false-positive was the universal
          # state of the gate across every consumer.
          PROJ_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 \
            -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" \
            "${BASE%/}/api/ci/projects/${PROJECT_SLUG}" || echo "000")
          case "$PROJ_CODE" in
            2*)
              echo "DevAudit project '${PROJECT_SLUG}' confirmed (HTTP ${PROJ_CODE})"
              ;;
            404)
              # Cross-check: does the project actually exist? versionPrefix=v
              # matches every release version shape (REQ-XXX, vYYYY.MM.DD,
              # vX.Y.Z) — we don't care about the body, only whether the
              # endpoint authorises the project. Endpoint returns 200 even
              # when no releases match the prefix (just with latest: null).
              CROSS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 \
                -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" \
                "${BASE%/}/api/ci/releases/resolve?projectSlug=${PROJECT_SLUG}&versionPrefix=v" \
                || echo "000")
              case "$CROSS_CODE" in
                2*)
                  echo "::error::Portal /api/ci/projects/${PROJECT_SLUG} returned 404 but releases/resolve confirms the project exists (HTTP ${CROSS_CODE}). This is a portal-side issue (missing or broken endpoint), not a bootstrap. Failing closed to avoid silently bypassing the four-eyes gate. Triage at metasession-dev/devaudit (and/or DevAudit-Installer#75)."
                  exit 1
                  ;;
                404)
                  echo "::warning::DevAudit project '${PROJECT_SLUG}' does not exist yet (HTTP 404 from both /api/ci/projects and /api/ci/releases/resolve) — bootstrap mode. Gate passes. The project will be auto-created by the first compliance-evidence.yml run; enforcement kicks in on the next PR after that."
                  echo "BOOTSTRAP_MODE=true" >> "$GITHUB_ENV"
                  exit 0
                  ;;
                401|403)
                  echo "::error::DevAudit returned HTTP ${CROSS_CODE} for releases/resolve on project '${PROJECT_SLUG}' (cross-check after the projects endpoint 404'd) — API key is invalid or lacks access. Verify DEVAUDIT_API_KEY belongs to the right project."
                  exit 1
                  ;;
                *)
                  echo "::error::Cross-check endpoint /api/ci/releases/resolve returned unexpected HTTP ${CROSS_CODE} after the projects endpoint 404'd. Investigate before retrying."
                  exit 1
                  ;;
              esac
              ;;
            401|403)
              echo "::error::DevAudit returned HTTP ${PROJ_CODE} for project '${PROJECT_SLUG}' — API key is invalid or lacks access. Verify DEVAUDIT_API_KEY belongs to the right project."
              exit 1
              ;;
            *)
              echo "::error::Unexpected HTTP ${PROJ_CODE} when probing DevAudit project '${PROJECT_SLUG}'. Investigate before retrying."
              exit 1
              ;;
          esac
          echo "BOOTSTRAP_MODE=false" >> "$GITHUB_ENV"
          # Strip trailing slash so we don't double-up later.
          echo "BASE=${BASE%/}" >> "$GITHUB_ENV"
          # Export for upload-evidence.sh / any other tool that reads $DEVAUDIT_BASE_URL directly.
          echo "DEVAUDIT_BASE_URL=${BASE%/}" >> "$GITHUB_ENV"

      - name: Resolve current release
        id: release
        if: env.BOOTSTRAP_MODE != 'true'
        run: |
          # devaudit#283 — repository_dispatch('release-approved') events
          # carry the release version in client_payload. Use it directly
          # when available to avoid re-deriving from git history.
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.release }}" ]; then
            LOOKUP_PREFIX="${{ github.event.client_payload.release }}"
            echo "Using release version from repository_dispatch payload: ${LOOKUP_PREFIX}"
          else
            # Derive the same release prefix the uploaders write to. The script
            # priority is: subject `[REQ-XXX]` → body `Ref: REQ-XXX` → body
            # `[REQ-XXX]` (merge-commit case) → bare-date fallback. Reusing it
            # here makes the gate and the uploaders agree on release identity
            # (#81). The 8 scenarios are covered by derive-release-version.test.sh.
            chmod +x scripts/derive-release-version.sh 2>/dev/null || true
            LOOKUP_PREFIX=$(bash scripts/derive-release-version.sh)
            echo "Derived release prefix from git history: ${LOOKUP_PREFIX}"
          fi
          echo "Resolving release for prefix: ${LOOKUP_PREFIX}"
          RESOLVE_URL="${BASE}/api/ci/releases/resolve?projectSlug=${PROJECT_SLUG}&versionPrefix=${LOOKUP_PREFIX}"
          # Retry: register-release in ci.yml may still be racing with us.
          MAX_ATTEMPTS=6
          WAIT_SECONDS=10
          RESP=""
          for ATTEMPT in $(seq 1 $MAX_ATTEMPTS); do
            RESP=$(curl -s -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" "${RESOLVE_URL}")
            VERSION=$(echo "$RESP" | jq -r '.latest.version // empty')
            if [ -n "$VERSION" ]; then
              break
            fi
            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: no release for ${LOOKUP_PREFIX} yet — waiting ${WAIT_SECONDS}s..."
              sleep $WAIT_SECONDS
            fi
          done
          VERSION=$(echo "$RESP" | jq -r '.latest.version // empty')
          if [ -z "$VERSION" ]; then
            echo "::error::No release found for ${LOOKUP_PREFIX} after ${MAX_ATTEMPTS} attempts. Push to develop first to create the release."
            exit 1
          fi
          RELEASE_ID=$(echo "$RESP" | jq -r '.latest.id')
          STATUS=$(echo "$RESP" | jq -r '.latest.status')
          APPROVED_SHA=$(echo "$RESP" | jq -r '.latestApprovedSha // empty')
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "approved_sha=${APPROVED_SHA}" >> "$GITHUB_OUTPUT"
          echo "Release ${VERSION} status: ${STATUS}"
          case "$STATUS" in
            uat_approved|prod_review|prod_approved|released)
              echo "Release approval confirmed (status: ${STATUS})"
              ;;
            *)
              echo "::error::Release ${VERSION} is '${STATUS}' — release approval required (have an authorised reviewer approve in DevAudit; in v1.22.x the backend status enum remains 'uat_approved')."
              exit 1
              ;;
          esac

      - name: Link PR to release
        if: env.BOOTSTRAP_MODE != 'true' && github.event_name == 'pull_request'
        run: |
          RELEASE_ID="${{ steps.release.outputs.release_id }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          curl -s -o /dev/null -w "PR link: HTTP %{http_code}\n" \
            -X PATCH "${BASE}/api/ci/releases/${RELEASE_ID}" \
            -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"prInfo\":{\"url\":\"${PR_URL}\",\"number\":${PR_NUMBER}}}"
          echo "Linked PR #${PR_NUMBER} to release ${RELEASE_ID}"

      - name: Post release link on PR
        if: env.BOOTSTRAP_MODE != 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          RELEASE_ID="${{ steps.release.outputs.release_id }}"
          COMPLY_URL="${BASE}/projects/${PROJECT_SLUG}/releases/${RELEASE_ID}"
          BODY="**DevAudit Release:** [${VERSION}](${COMPLY_URL})"
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.body | startswith("**DevAudit Release:**")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${EXISTING} -X PATCH -f body="${BODY}" || true
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "${BODY}" || true
          fi

      - name: SHA comparison
        if: env.BOOTSTRAP_MODE != 'true' && github.event_name == 'pull_request'
        run: |
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          APPROVED_SHA="${{ steps.release.outputs.approved_sha }}"
          if [ -n "$APPROVED_SHA" ] && [ "$APPROVED_SHA" != "$PR_HEAD_SHA" ]; then
            echo "::warning::Approved SHA (${APPROVED_SHA:0:8}) differs from PR HEAD (${PR_HEAD_SHA:0:8}). Code may have changed after approval."
          fi

      - name: Create refreshed PR check run (workflow_dispatch / repository_dispatch re-trigger)
        if: env.BOOTSTRAP_MODE != 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_SHA="${{ github.event.client_payload.approved_sha || '' }}"
          if [ -z "$TARGET_SHA" ]; then
            TARGET_SHA="${{ steps.release.outputs.approved_sha }}"
          fi

          RELEASE_PR="${{ github.event.client_payload.release_pr || '' }}"
          if [ -z "$TARGET_SHA" ] && [ -n "$RELEASE_PR" ] && [ "$RELEASE_PR" != "null" ]; then
            TARGET_SHA=$(gh pr view "$RELEASE_PR" --json headRefOid --jq '.headRefOid // empty' 2>/dev/null || true)
          fi

          if [ -z "$TARGET_SHA" ]; then
            PR_DATA=$(gh pr list --base main --json number,headRefOid,updatedAt --limit 20 2>/dev/null || echo '[]')
            TARGET_SHA=$(echo "$PR_DATA" | jq -r 'sort_by(.updatedAt) | reverse | .[0].headRefOid // empty' 2>/dev/null || true)
          fi

          if [ -z "$TARGET_SHA" ]; then
            echo "::error::Unable to resolve PR head SHA for DevAudit Release Approval check refresh. Portal dispatch should include approved_sha."
            exit 1
          fi

          CHECK_NAME="DevAudit Release Approval"
          DETAILS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMPLETED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # DevAudit-Installer#351 — GitHub's Feb 2025 check-run changes
          # forbid externally mutating an existing workflow-owned check run
          # from a workflow_dispatch / repository_dispatch flow. The refresh
          # path therefore creates a fresh success check run on the approved
          # SHA instead of PATCHing the original failed PR check.
          gh api "/repos/${{ github.repository }}/check-runs" \
            -X POST \
            -f name="$CHECK_NAME" \
            -f head_sha="$TARGET_SHA" \
            -f status=completed \
            -f conclusion=success \
            -f completed_at="$COMPLETED_AT" \
            -f details_url="$DETAILS_URL" \
            -f external_id="${{ github.run_id }}" \
            -f "output[title]=DevAudit release approval confirmed" \
            -f "output[summary]=Release ${{ steps.release.outputs.version }} is approved in DevAudit."
          echo "Created refreshed ${CHECK_NAME} check run on ${TARGET_SHA}."
