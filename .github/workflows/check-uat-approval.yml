# UAT Approval Gate — blocks PR merge until release is approved in META-COMPLY
#
# Generated by sync-sdlc.sh from sdlc-config.json.
# Do not edit manually — re-run the sync script to regenerate.

name: UAT Approval Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-approval:
    name: META-COMPLY UAT Approval
    runs-on: self-hosted
    env:
      SUPABASE_URL: ${{ secrets.META_COMPLY_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.META_COMPLY_SERVICE_ROLE_KEY }}
      PROJECT_SLUG: wawagardenbar-app

    steps:
      - uses: actions/checkout@v4

      - name: Look up project
        id: project
        run: |
          PROJECT_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.${PROJECT_SLUG}&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Project '${PROJECT_SLUG}' not found in META-COMPLY."
            exit 1
          fi
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"

      - name: Determine release version
        id: version
        run: |
          DATE_PREFIX="v$(date +%Y.%m.%d)"
          PROJECT_ID="${{ steps.project.outputs.project_id }}"
          # Find the latest release for today (supports multiple releases per day)
          EXISTING=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJECT_ID}&version=like.${DATE_PREFIX}%25&select=version&order=created_at.desc&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
          VERSION=$(echo "$EXISTING" | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$VERSION" ]; then
            VERSION="${DATE_PREFIX}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Checking UAT approval for version: ${VERSION}"

      - name: Check release UAT approval status
        id: release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PROJECT_ID="${{ steps.project.outputs.project_id }}"
          RELEASE_DATA=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJECT_ID}&version=eq.${VERSION}&select=id,version,status" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
          RELEASE_STATUS=$(echo "$RELEASE_DATA" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
          RELEASE_ID=$(echo "$RELEASE_DATA" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$RELEASE_STATUS" ]; then
            echo "::error::Release ${VERSION} not found. Push to develop first to create the release."
            exit 1
          fi
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "Release ${VERSION} status: ${RELEASE_STATUS}"
          case "$RELEASE_STATUS" in
            uat_approved|prod_review|prod_approved|released)
              echo "UAT approval confirmed (status: ${RELEASE_STATUS})"
              ;;
            *)
              echo "::error::Release ${VERSION} is '${RELEASE_STATUS}' — UAT approval required."
              exit 1
              ;;
          esac

      - name: Link PR to release
        if: github.event_name == 'pull_request'
        run: |
          RELEASE_ID="${{ steps.release.outputs.release_id }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -n "$RELEASE_ID" ]; then
            curl -s -o /dev/null -w "PR link: HTTP %{http_code}\n" \
              -X PATCH "${SUPABASE_URL}/rest/v1/compliance_releases?id=eq.${RELEASE_ID}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"pr_url\": \"${PR_URL}\", \"pr_number\": ${PR_NUMBER}}"
            echo "Linked PR #${PR_NUMBER} to release ${RELEASE_ID}"
          fi

      - name: Post release link on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_ID="${{ steps.release.outputs.release_id }}"
          COMPLY_URL="https://meta-comply-production.up.railway.app/projects/${PROJECT_SLUG}/releases/${RELEASE_ID}"
          BODY="**META-COMPLY Release:** [${VERSION}](${COMPLY_URL})"
          # Update existing comment or create new one
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.body | startswith("**META-COMPLY Release:**")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${EXISTING} -X PATCH -f body="${BODY}" || true
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "${BODY}" || true
          fi

      - name: SHA comparison
        if: github.event_name == 'pull_request'
        run: |
          RELEASE_ID="${{ steps.release.outputs.release_id }}"
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Get the approved SHA from the latest approval record
          APPROVED_SHA=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_release_approvals?release_id=eq.${RELEASE_ID}&status=eq.approved&order=created_at.desc&limit=1&select=approved_sha" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"approved_sha":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$APPROVED_SHA" ] && [ "$APPROVED_SHA" != "$PR_HEAD_SHA" ]; then
            echo "::warning::Approved SHA (${APPROVED_SHA:0:8}) differs from PR HEAD (${PR_HEAD_SHA:0:8}). Code may have changed after approval."
          fi
