# UAT Approval Gate — blocks PR merge until release is approved in META-COMPLY
#
# Generated by sync-sdlc.sh from sdlc-config.json.
# Do not edit manually — re-run the sync script to regenerate.

name: UAT Approval Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-approval:
    name: META-COMPLY UAT Approval
    runs-on: self-hosted
    env:
      SUPABASE_URL: ${{ secrets.META_COMPLY_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.META_COMPLY_SERVICE_ROLE_KEY }}
      PROJECT_SLUG: wawagardenbar-app

    steps:
      - uses: actions/checkout@v4

      - name: Look up project
        id: project
        run: |
          PROJECT_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.${PROJECT_SLUG}&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Project '${PROJECT_SLUG}' not found in META-COMPLY."
            exit 1
          fi
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"

      - name: Determine release version
        id: version
        run: |
          DATE_PREFIX="v$(date +%Y.%m.%d)"
          PROJECT_ID="${{ steps.project.outputs.project_id }}"
          # Find the latest release for today (supports multiple releases per day)
          EXISTING=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJECT_ID}&version=like.${DATE_PREFIX}%25&select=version&order=created_at.desc&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
          VERSION=$(echo "$EXISTING" | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$VERSION" ]; then
            VERSION="${DATE_PREFIX}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Checking UAT approval for version: ${VERSION}"

      - name: Check release UAT approval status
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PROJECT_ID="${{ steps.project.outputs.project_id }}"
          RELEASE_STATUS=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJECT_ID}&version=eq.${VERSION}&select=id,version,status" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$RELEASE_STATUS" ]; then
            echo "::error::Release ${VERSION} not found. Push to develop first to create the release."
            exit 1
          fi
          echo "Release ${VERSION} status: ${RELEASE_STATUS}"
          case "$RELEASE_STATUS" in
            uat_approved|prod_review|prod_approved|released)
              echo "UAT approval confirmed (status: ${RELEASE_STATUS})"
              ;;
            *)
              echo "::error::Release ${VERSION} is '${RELEASE_STATUS}' — UAT approval required."
              exit 1
              ;;
          esac
