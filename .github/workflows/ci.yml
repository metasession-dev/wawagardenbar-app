# CI Pipeline — all gates on every code push to develop
#
# Generated by `devaudit install` / `devaudit update` from sdlc-config.json.
# Do not edit manually — re-run the CLI (`devaudit update`) to regenerate.
#
# Single consolidated job — on a self-hosted runner, parallel jobs run
# sequentially anyway. One checkout + one cached npm ci = fast.
#
# PRs to main inherit commit status via branch protection.
# Compliance validation runs separately on PRs (compliance-validation.yml).

name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths-ignore:
      - 'SDLC/**'
      - 'compliance/**'
      - '*.md'
      - '.cursorrules'
      - '.windsurfrules'
      - 'sdlc-config.json'
      - 'scripts/upload-evidence.sh'
      - 'scripts/validate-compliance-artifacts.sh'
      - 'scripts/validate-commits.sh'
      - 'scripts/check-requirement-jsdoc.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # All quality gates in a single job — one checkout, cached installs
  # ──────────────────────────────────────────────
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:

      MONGODB_DB_NAME: wawagardenbar_test
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2

    steps:
      - uses: actions/checkout@v4

      # ── Cached installs (skip if already present on self-hosted runner) ──

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (skip if lockfile unchanged)
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          if [ -f node_modules/.lock-hash ] && [ "$(cat node_modules/.lock-hash)" = "$LOCK_HASH" ]; then
            echo "node_modules up to date — skipping npm ci"
          else
            npm ci
            echo "$LOCK_HASH" > node_modules/.lock-hash
          fi

      - name: Install Semgrep (skip if already installed)
        run: |
          VENV="$HOME/.semgrep-venv"
          if [ -x "$VENV/bin/semgrep" ]; then
            echo "Semgrep already installed"
          else
            python3 -m venv "$VENV"
            "$VENV/bin/pip" install semgrep
          fi
          echo "$VENV/bin" >> "$GITHUB_PATH"

      - name: Install Playwright (skip if already cached)
        run: npx playwright install --with-deps chromium 2>/dev/null || npx playwright install chromium

      # ── Gate 1: TypeScript ──

      - name: TypeScript Check
        run: npx tsc --noEmit

      # ── Gate 2: SAST (Semgrep) ──

      - name: SAST Scan
        run: |
          # --output writes the JSON report to the file directly; stderr
          # (progress/metrics/version notices) goes to /dev/null. Using
          # `> file 2>&1` instead merged semgrep's stderr into the JSON and
          # produced an unparseable file (DevAudit #48).
          semgrep scan --config auto app/ lib/ \
            --severity ERROR --severity WARNING \
            --json --output sast-results.json 2>/dev/null || true
          FINDINGS=$(python3 -c "
          import json
          with open('sast-results.json') as f:
            data = json.load(f)
          results = data.get('results', [])
          print(len(results))
          " 2>/dev/null || echo "0")
          echo "SAST findings: $FINDINGS"
          BASELINE=0
          if [ "$FINDINGS" -gt "$BASELINE" ]; then
            echo "::error::New SAST findings ($FINDINGS > baseline $BASELINE)."
            exit 1
          fi

      # ── Gate 3: Dependency Audit ──

      - name: Dependency Audit
        run: |
          # stderr → /dev/null so warnings can't corrupt the JSON (DevAudit #48)
          npm audit --json > dependency-audit.json 2>/dev/null || true
          ACCEPTED=""
          UNACCEPTED=$(python3 -c "
          import json
          with open('dependency-audit.json') as f:
            data = json.load(f)
          accepted = set('${ACCEPTED}'.split()) if '${ACCEPTED}' else set()
          vulns = data.get('vulnerabilities', {})
          issues = [name for name, v in vulns.items()
                    if v.get('severity') in ('high', 'critical')
                    and name not in accepted]
          print(len(issues))
          " 2>/dev/null || echo "unknown")
          echo "Unaccepted high/critical: $UNACCEPTED"
          if [ "$UNACCEPTED" != "0" ] && [ "$UNACCEPTED" != "unknown" ]; then
            echo "::error::$UNACCEPTED unaccepted high/critical vulnerability(ies)."
            exit 1
          fi

      # ── Gate 4: E2E Tests (Playwright) ──

      - name: Set database URI from dynamic port
        run: |
          DB_PORT="${{ job.services.mongodb.ports['27017:27017'] }}"
          echo "MONGODB_WAWAGARDENBAR_APP_URI=mongodb://localhost:${DB_PORT}" >> "$GITHUB_ENV"
          echo "Database on port: ${DB_PORT}"
      - name: E2E setup
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_test
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: E2eTest@2026!
          E2E_SUPER_ADMIN_USERNAME: e2e-superadmin
          E2E_SUPER_ADMIN_PASSWORD: E2eTest@2026!
          E2E_CSR_USERNAME: e2e-csr
          E2E_CSR_PASSWORD: E2eTest@2026!
        run: |
          npx tsx scripts/seed-e2e-admins.ts
          npx tsx scripts/seed-food-menu.ts
          npx tsx scripts/seed-drinks-menu.ts
          npx tsx scripts/seed-inventory.ts

      - name: Kill stale dev server
        run: lsof -ti:3000 | xargs kill -9 2>/dev/null || true

      - name: Start dev server
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_test
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: E2eTest@2026!
          E2E_SUPER_ADMIN_USERNAME: e2e-superadmin
          E2E_SUPER_ADMIN_PASSWORD: E2eTest@2026!
          E2E_CSR_USERNAME: e2e-csr
          E2E_CSR_PASSWORD: E2eTest@2026!
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: E2E Tests
        env:
          # PLAYWRIGHT_JSON_OUTPUT_NAME makes the json reporter write straight
          # to the file. Capturing stdout (`> e2e-results.json`) instead mixed
          # the html reporter's "To open report" line in after the JSON blob
          # and produced an unparseable file (DevAudit #48). html report still
          # lands in playwright-report/.
          PLAYWRIGHT_HTML_REPORTER_OPEN: never
          PLAYWRIGHT_JSON_OUTPUT_NAME: e2e-results.json
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_test
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: E2eTest@2026!
          E2E_SUPER_ADMIN_USERNAME: e2e-superadmin
          E2E_SUPER_ADMIN_PASSWORD: E2eTest@2026!
          E2E_CSR_USERNAME: e2e-csr
          E2E_CSR_PASSWORD: E2eTest@2026!
        run: npx playwright test --project=smoke --reporter=json,html

      # ── Gate 5: Build ──

      - name: Build Check
        run: npm run build
        env:
          MONGODB_DB_NAME: wawagardenbar_placeholder
          MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2

      # ── Upload artifacts ──

      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: ci-results
          path: |
            sast-results.json
            dependency-audit.json
            e2e-results.json
            e2e-auth-results.json
            playwright-report/
            coverage/coverage-summary.json
            compliance/evidence/*/screenshots/*.png
          retention-days: 90

  # ──────────────────────────────────────────────
  # Register release early (parallel with gates) so UAT gate can find it
  # ──────────────────────────────────────────────
  register-release:
    name: Register Release
    runs-on: ubuntu-latest
    if: ${{ vars.DEVAUDIT_BASE_URL != '' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      DEVAUDIT_BASE_URL: ${{ vars.DEVAUDIT_BASE_URL }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate DevAudit env
        run: |
          if [ -z "${DEVAUDIT_BASE_URL}" ] || [ -z "${DEVAUDIT_API_KEY}" ]; then
            echo "::error::DEVAUDIT_BASE_URL (variable) and DEVAUDIT_API_KEY (secret) must both be set."
            exit 1
          fi
          echo "BASE=${DEVAUDIT_BASE_URL%/}" >> "$GITHUB_ENV"

      - name: Determine release version
        id: version
        run: |
          # Release identity is the REQ tag on the latest commit
          # ([REQ-XXX] in subject, Ref: REQ-XXX in body), with a bare-date
          # fallback for housekeeping commits. Both this workflow and
          # compliance-evidence.yml call the same helper so a single
          # feature converges on one release record. See DevAudit #310.
          chmod +x scripts/derive-release-version.sh 2>/dev/null || true
          VERSION=$(./scripts/derive-release-version.sh)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Ensure release exists
        run: |
          chmod +x scripts/upload-evidence.sh 2>/dev/null || true
          # Create the release in DevAudit (no evidence yet — just registration)
          bash scripts/upload-evidence.sh \
            wgb _compliance-docs compliance_document README.md \
            --release ${{ steps.version.outputs.version }} --create-release-if-missing \
            --environment uat --category planning \
            --git-sha ${{ github.sha }} --branch ${{ github.ref_name }} || true

      - name: Sync known requirements from RTM
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f "compliance/RTM.md" ]; then exit 0; fi

          # Per REQ row in RTM we look up: title (release-ticket H1, else the
          # linked issue's title via `gh`), and risk_class (the first LOW /
          # MEDIUM / HIGH / CRITICAL token in the row). Both are optional —
          # the portal renders gracefully with nulls. The portal endpoint
          # accepts either a bare string[] (legacy) or rich rows.
          REQS_JSON='[]'
          while IFS= read -r REQ; do
            [ -z "$REQ" ] && continue
            ROW=$(grep -m1 -E "^\| ${REQ} " compliance/RTM.md || true)
            TITLE=""
            # Title: release-ticket H1 first (pending then approved)
            for FILE in "compliance/pending-releases/RELEASE-TICKET-${REQ}.md" \
                        "compliance/approved-releases/RELEASE-TICKET-${REQ}.md"; do
              if [ -f "$FILE" ]; then
                TITLE=$(grep -m1 '^# ' "$FILE" \
                  | sed -E 's/^# *(REQ-[0-9]+)?[[:space:]]*[—:-]?[[:space:]]*//')
                break
              fi
            done
            # Title fallback: first issue # found anywhere in the row
            if [ -z "$TITLE" ] && [ -n "$ROW" ]; then
              ISSUE_NUM=$(echo "$ROW" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
              if [ -n "$ISSUE_NUM" ]; then
                TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq .title 2>/dev/null || true)
              fi
            fi
            # Risk: first LOW/MEDIUM/HIGH/CRITICAL token in the row
            RISK=""
            if [ -n "$ROW" ]; then
              RISK=$(echo "$ROW" | grep -ioE '\b(LOW|MEDIUM|HIGH|CRITICAL)\b' | head -1 \
                | tr 'a-z' 'A-Z')
            fi
            REQS_JSON=$(echo "$REQS_JSON" | jq \
              --arg id "$REQ" --arg title "$TITLE" --arg risk "$RISK" \
              '. + [{
                id: $id,
                title: (if $title == "" then null else $title end),
                riskClass: (if $risk == "" then null else $risk end)
              }]')
          done < <(grep -oE 'REQ-[0-9]+' compliance/RTM.md | sort -t- -k2 -n -u)

          COUNT=$(echo "$REQS_JSON" | jq length)
          if [ "$COUNT" = "0" ]; then
            echo "No REQ-XXX rows in RTM.md — skipping sync"
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH "${BASE}/api/ci/projects/wgb/known-requirements" \
            -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"requirements\": ${REQS_JSON}}")
          echo "known_requirements sync: HTTP ${HTTP_CODE}"
          echo "Synced ${COUNT} requirements from RTM.md (titles + risk_class)"

  # ──────────────────────────────────────────────
  # Upload Evidence to DevAudit (after gates pass)
  # ──────────────────────────────────────────────
  upload-evidence:
    name: Upload Evidence
    runs-on: ubuntu-latest
    needs: [quality-gates, register-release]
    if: ${{ !failure() && !cancelled() && vars.DEVAUDIT_BASE_URL != '' }}
    env:
      DEVAUDIT_BASE_URL: ${{ vars.DEVAUDIT_BASE_URL }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Download CI gate artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-results
          path: ci-evidence/

      - name: Generate and upload gate evidence
        if: env.DEVAUDIT_BASE_URL != ''
        run: |
          chmod +x scripts/upload-evidence.sh 2>/dev/null || true
          FLAGS="--git-sha ${{ github.sha }} --ci-run-id ${{ github.run_id }} --branch ${{ github.ref_name }}"
          FLAGS="${FLAGS} --release ${{ needs.register-release.outputs.version }} --create-release-if-missing"
          FLAGS="${FLAGS} --environment uat"

          # Track failures across all uploads so we can fail the job at the
          # end with the full picture. Previously each upload used
          # `|| echo "Warning: ..."` which masked every error as a benign
          # warning, letting broken releases ship without gate evidence
          # (DevAudit #132).
          UPLOAD_FAILURES=0
          upload() {
            local label="$1"; shift
            echo "Uploading: ${label}"
            if ! bash scripts/upload-evidence.sh "$@"; then
              echo "::error::Failed to upload ${label}"
              UPLOAD_FAILURES=$((UPLOAD_FAILURES + 1))
            fi
          }

          # Re-generate gate evidence as fallback if artifact download failed
          mkdir -p ci-evidence
          if [ ! -f ci-evidence/sast-results.json ]; then
            VENV="$HOME/.semgrep-venv"
            if [ -x "$VENV/bin/semgrep" ]; then
              "$VENV/bin/semgrep" scan --config auto app/ lib/ --json --output ci-evidence/sast-results.json 2>/dev/null || echo '{"results":[]}' > ci-evidence/sast-results.json
            else
              echo '{"results":[]}' > ci-evidence/sast-results.json
            fi
          fi
          if [ ! -f ci-evidence/dependency-audit.json ]; then
            npm audit --json > ci-evidence/dependency-audit.json 2>/dev/null || echo '{"vulnerabilities":{}}' > ci-evidence/dependency-audit.json
          fi

          # Upload SAST results — precise evidence_type=sast_report (Phase 3a /
          # devaudit#370). Pre-3a uploads used `audit_log` + category alone,
          # which made the portal's SAST and Dependency Audit gates show
          # identical content (devaudit#387). Tagging the precise type keeps
          # the two panels distinct + matches the ISO 27001 A.8.28 clause.
          if [ -f ci-evidence/sast-results.json ]; then
            upload sast-results.json \
              wgb _compliance-docs sast_report ci-evidence/sast-results.json \
              --category security_scan ${FLAGS}
          fi

          # Upload dependency audit — precise evidence_type=dependency_audit
          # (same rationale as SAST above).
          if [ -f ci-evidence/dependency-audit.json ]; then
            upload dependency-audit.json \
              wgb _compliance-docs dependency_audit ci-evidence/dependency-audit.json \
              --category security_scan ${FLAGS}
          fi

          # Upload E2E test results (ci_pipeline category)
          if [ -f ci-evidence/e2e-results.json ]; then
            upload e2e-results.json \
              wgb _compliance-docs e2e_result ci-evidence/e2e-results.json \
              --category ci_pipeline ${FLAGS}
          fi

          # Upload Playwright HTML report (test_report category)
          if [ -d ci-evidence/playwright-report ]; then
            (cd ci-evidence && zip -qr playwright-report.zip playwright-report/) 2>/dev/null || true
            if [ -f ci-evidence/playwright-report.zip ]; then
              upload playwright-report.zip \
                wgb _compliance-docs test_report ci-evidence/playwright-report.zip \
                --category test_report ${FLAGS}
            fi
          fi

          # Upload Jest coverage summary (test_report category)
          if [ -f ci-evidence/coverage/coverage-summary.json ]; then
            upload coverage-summary.json \
              wgb _compliance-docs test_report ci-evidence/coverage/coverage-summary.json \
              --category test_report ${FLAGS}
          fi

          # Upload test summary report (test_report category)
          if [ -f "compliance/test-summary-report.md" ]; then
            upload test-summary-report.md \
              wgb _compliance-docs compliance_document compliance/test-summary-report.md \
              --category test_report ${FLAGS}
          fi

          # Upload per-AC e2e evidence screenshots, scoped to each in-scope
          # requirement so they render under "Evidence by requirement" in the
          # portal. These are the per-assertion `evidenceShot(page, REQ, 'ACn-…')`
          # captures (compliance/evidence/<reqId>/screenshots/*.png) — taken at the
          # moment each acceptance criterion is demonstrated, NOT the Playwright
          # report's trailing/failure capture. evidenceType `screenshot` →
          # image/png renders inline. Only when a pending release ticket defines
          # the in-scope REQ(s); skipped on ordinary dev pushes. Best-effort: a
          # screenshot upload failure warns but never blocks the gate.
          SHOT_REQS=()
          if [ -d compliance/pending-releases ]; then
            for TICKET in compliance/pending-releases/RELEASE-TICKET-REQ-*.md; do
              [ -f "$TICKET" ] || continue
              SHOT_REQS+=("$(basename "$TICKET" .md | sed 's/^RELEASE-TICKET-//')")
            done
          fi
          shopt -s nullglob
          # Only this run's freshly-generated screenshots (from the ci-results
          # artifact). The full pack regenerates them every run, so the committed
          # copies under compliance/evidence/ are redundant here — globbing both
          # uploaded every image twice (deduped on display, but wasteful + rate-limit
          # pressure) and swept in legacy screenshots from unrelated past releases.
          SHOTS=(ci-evidence/compliance/evidence/*/screenshots/*.png)
          if [ "${#SHOT_REQS[@]}" -gt 0 ] && [ "${#SHOTS[@]}" -gt 0 ]; then
            echo "Uploading ${#SHOTS[@]} evidence screenshot(s) for: ${SHOT_REQS[*]}"
            SHOT_TMP="$(mktemp -d)"
            for REQ in "${SHOT_REQS[@]}"; do
              # Per-REQ release metadata for the portal (no-clobbered on existing rows):
              # release title from the pending ticket's H1; change type from the
              # latest commit that references the REQ.
              REQ_TITLE=""
              if [ -f "compliance/pending-releases/RELEASE-TICKET-${REQ}.md" ]; then
                REQ_TITLE=$(grep -m1 '^# ' "compliance/pending-releases/RELEASE-TICKET-${REQ}.md" \
                  | sed -E 's/^# *(REQ-[0-9]+)?[[:space:]]*[—:-]?[[:space:]]*//')
              fi
              REQ_CT=$(git log --grep "\[${REQ}\]\|Ref: ${REQ}" --pretty=%s -1 2>/dev/null \
                | grep -oE '^(feat|fix|refactor|perf|chore|docs|ci|build|test|compliance|revert)' \
                | head -1 || true)
              REQ_META=()
              [ -n "$REQ_TITLE" ] && REQ_META+=(--release-title "$REQ_TITLE")
              [ -n "$REQ_CT" ] && REQ_META+=(--change-type "$REQ_CT")
              for PNG in "${SHOTS[@]}"; do
                # The folder is the (SRS) requirement id, the basename is the AC
                # slug (ACn-…). Upload as <srs-req>-<slug>.png so the reviewer can
                # see which requirement/AC each image proves and names don't collide.
                SRS_REQ="$(basename "$(dirname "$(dirname "$PNG")")")"
                NAMED="${SHOT_TMP}/${SRS_REQ}-$(basename "$PNG")"
                cp "$PNG" "$NAMED" 2>/dev/null || continue
                bash scripts/upload-evidence.sh \
                  wgb "$REQ" screenshot "$NAMED" \
                  --category test_report ${FLAGS} --release "$REQ" \
                  "${REQ_META[@]}" \
                  || echo "::warning::evidence screenshot upload failed: ${PNG} -> ${REQ}"
              done
            done
          fi
          shopt -u nullglob

          # NOTE: committed compliance docs (planning category: RTM/test-plan/
          # test-cases, release tickets, and per-requirement
          # compliance/evidence/REQ-*/ folders) are intentionally NOT uploaded
          # here. compliance-evidence.yml is the single owner of those — it
          # fires on every compliance/** push and uploads them to the same
          # release (both workflows resolve the same version via
          # derive-release-version.sh). Uploading them here too meant any push
          # touching both code and compliance/ ran both workflows and inserted
          # a duplicate row for every doc (evidence is append-only, no upsert),
          # and re-populated the release matrix with the full catalogue. This
          # job now uploads ONLY run-generated gate evidence (security_scan /
          # ci_pipeline / test_report) above. See issue #45.

          if [ "$UPLOAD_FAILURES" -gt 0 ]; then
            echo "::error::${UPLOAD_FAILURES} evidence upload(s) failed — release is missing gate evidence and cannot pass UAT review"
            exit 1
          fi

      - name: Summary
        run: echo "Evidence uploaded for ${{ needs.register-release.outputs.version }} (UAT)"
