# CI Pipeline — all gates on every code push to develop
#
# Generated by sync-sdlc.sh from sdlc-config.json.
# Do not edit manually — re-run the sync script to regenerate.
#
# Single consolidated job — on a self-hosted runner, parallel jobs run
# sequentially anyway. One checkout + one cached npm ci = fast.
#
# PRs to main inherit commit status via branch protection.
# Compliance validation runs separately on PRs (compliance-validation.yml).

name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths-ignore:
      - '.github/workflows/**'
      - 'SDLC/**'
      - 'compliance/**'
      - '*.md'
      - '.cursorrules'
      - '.windsurfrules'
      - 'sdlc-config.json'
      - 'scripts/upload-evidence.sh'
      - 'scripts/validate-compliance-artifacts.sh'
      - 'scripts/validate-commits.sh'
      - 'scripts/check-requirement-jsdoc.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # All quality gates in a single job — one checkout, cached installs
  # ──────────────────────────────────────────────
  quality-gates:
    name: Quality Gates
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017

    env:
      MONGODB_DB_NAME: wawagardenbar_test
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_COOKIE_NAME: wawa_session
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2


    steps:
      - uses: actions/checkout@v4

      # ── Cached installs (skip if already present on self-hosted runner) ──

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (skip if lockfile unchanged)
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          if [ -f node_modules/.lock-hash ] && [ "$(cat node_modules/.lock-hash)" = "$LOCK_HASH" ]; then
            echo "node_modules up to date — skipping npm ci"
          else
            npm ci
            echo "$LOCK_HASH" > node_modules/.lock-hash
          fi

      - name: Install Semgrep (skip if already installed)
        run: |
          VENV="$HOME/.semgrep-venv"
          if [ -x "$VENV/bin/semgrep" ]; then
            echo "Semgrep already installed"
          else
            python3 -m venv "$VENV"
            "$VENV/bin/pip" install semgrep
          fi
          echo "$VENV/bin" >> "$GITHUB_PATH"

      - name: Install Playwright (skip if already cached)
        run: npx playwright install --with-deps chromium 2>/dev/null || npx playwright install chromium

      # ── Gate 1: TypeScript ──

      - name: TypeScript Check
        run: npx tsc --noEmit

      # ── Gate 2: SAST (Semgrep) ──

      - name: SAST Scan
        run: |
          semgrep scan --config auto app/ lib/ services/ models/ \
            --severity ERROR --severity WARNING \
            --json > sast-results.json 2>&1 || true
          FINDINGS=$(python3 -c "
          import json
          with open('sast-results.json') as f:
            data = json.load(f)
          results = data.get('results', [])
          print(len(results))
          " 2>/dev/null || echo "0")
          echo "SAST findings: $FINDINGS"
          BASELINE=6
          if [ "$FINDINGS" -gt "$BASELINE" ]; then
            echo "::error::New SAST findings ($FINDINGS > baseline $BASELINE)."
            exit 1
          fi

      # ── Gate 3: Dependency Audit ──

      - name: Dependency Audit
        run: |
          npm audit --json > dependency-audit.json 2>&1 || true
          ACCEPTED="xlsx"
          UNACCEPTED=$(python3 -c "
          import json
          with open('dependency-audit.json') as f:
            data = json.load(f)
          accepted = set('${ACCEPTED}'.split()) if '${ACCEPTED}' else set()
          vulns = data.get('vulnerabilities', {})
          issues = [name for name, v in vulns.items()
                    if v.get('severity') in ('high', 'critical')
                    and name not in accepted]
          print(len(issues))
          " 2>/dev/null || echo "unknown")
          echo "Unaccepted high/critical: $UNACCEPTED"
          if [ "$UNACCEPTED" != "0" ] && [ "$UNACCEPTED" != "unknown" ]; then
            echo "::error::$UNACCEPTED unaccepted high/critical vulnerability(ies)."
            exit 1
          fi

      # ── Gate 4: E2E Tests (Playwright) ──

      - name: Set database URI from dynamic port
        run: |
          DB_PORT="${{ job.services.mongodb.ports['27017'] }}"
          echo "MONGODB_WAWAGARDENBAR_APP_URI=mongodb://localhost:${DB_PORT}" >> "$GITHUB_ENV"
          echo "Database on port: ${DB_PORT}"

      - name: Kill stale dev server
        run: lsof -ti:3000 | xargs kill -9 2>/dev/null || true

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: E2E Tests
        run: npx playwright test --project=chromium --reporter=json > e2e-results.json 2>/dev/null || npx playwright test --project=chromium

      # ── Gate 5: Build ──

      - name: Build Check
        run: npm run build
        env:
          MONGODB_DB_NAME: wawagardenbar_placeholder
          MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SESSION_COOKIE_NAME: wawa_session
          SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2

      # ── Upload artifacts ──

      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: ci-results
          path: |
            sast-results.json
            dependency-audit.json
            e2e-results.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # Upload Evidence to META-COMPLY (after gates pass)
  # ──────────────────────────────────────────────
  upload-evidence:
    name: Upload Evidence
    runs-on: self-hosted
    needs: [quality-gates]
    if: ${{ !failure() && !cancelled() }}
    env:
      SUPABASE_URL: ${{ secrets.META_COMPLY_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.META_COMPLY_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: |
          DATE_PREFIX="v$(date +%Y.%m.%d)"
          # Check for existing releases today to support multiple releases per day
          if [ -n "${SUPABASE_URL}" ] && [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            PROJ_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.wawagardenbar-app&select=id" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            if [ -n "$PROJ_ID" ]; then
              EXISTING=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJ_ID}&version=like.${DATE_PREFIX}%25&select=version&order=created_at.desc&limit=1" \
                -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
              LATEST=$(echo "$EXISTING" | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
              if [ -n "$LATEST" ]; then
                # Extract sequence number: v2026.03.31 → 1, v2026.03.31.3 → 3
                SEQ=$(echo "$LATEST" | sed -n "s/^${DATE_PREFIX}\.//p")
                if [ -z "$SEQ" ]; then
                  SEQ=1
                fi
                VERSION="${DATE_PREFIX}.$((SEQ + 1))"
              else
                VERSION="${DATE_PREFIX}"
              fi
            else
              VERSION="${DATE_PREFIX}"
            fi
          else
            VERSION="${DATE_PREFIX}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Sync known requirements from RTM
        if: env.SUPABASE_URL != ''
        run: |
          if [ -f "compliance/RTM.md" ]; then
            REQS=$(grep -oP 'REQ-\d+' compliance/RTM.md | sort -t- -k2 -n -u)
            if [ -n "$REQS" ]; then
              JSON_ARRAY="["
              FIRST=true
              for REQ in $REQS; do
                [ "$FIRST" = true ] && FIRST=false || JSON_ARRAY="${JSON_ARRAY},"
                JSON_ARRAY="${JSON_ARRAY}\"${REQ}\""
              done
              JSON_ARRAY="${JSON_ARRAY}]"
              PROJ_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.wawagardenbar-app&select=id" \
                -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              if [ -n "$PROJ_ID" ]; then
                curl -s -o /dev/null -w "known_requirements sync: HTTP %{http_code}\n" \
                  -X PATCH "${SUPABASE_URL}/rest/v1/compliance_projects?id=eq.${PROJ_ID}" \
                  -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                  -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"known_requirements\": ${JSON_ARRAY}}"
                echo "Synced $(echo "$REQS" | wc -w) requirements from RTM.md"
              fi
            fi
          fi

      - name: Download CI gate artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ci-results
          path: ci-evidence/

      - name: Generate and upload gate evidence
        if: env.SUPABASE_URL != ''
        run: |
          chmod +x scripts/upload-evidence.sh 2>/dev/null || true
          FLAGS="--git-sha ${{ github.sha }} --ci-run-id ${{ github.run_id }} --branch ${{ github.ref_name }}"
          FLAGS="${FLAGS} --release ${{ steps.version.outputs.version }} --create-release-if-missing"
          FLAGS="${FLAGS} --environment uat"

          # Re-generate gate evidence as fallback if artifact download failed
          mkdir -p ci-evidence
          if [ ! -f ci-evidence/sast-results.json ]; then
            VENV="$HOME/.semgrep-venv"
            if [ -x "$VENV/bin/semgrep" ]; then
              "$VENV/bin/semgrep" scan --config auto app/ lib/ services/ models/ --json > ci-evidence/sast-results.json 2>/dev/null || echo '{"results":[]}' > ci-evidence/sast-results.json
            else
              echo '{"results":[]}' > ci-evidence/sast-results.json
            fi
          fi
          if [ ! -f ci-evidence/dependency-audit.json ]; then
            npm audit --json > ci-evidence/dependency-audit.json 2>/dev/null || echo '{"vulnerabilities":{}}' > ci-evidence/dependency-audit.json
          fi

          # Upload SAST results (security_scan category)
          if [ -f ci-evidence/sast-results.json ]; then
            echo "Uploading: sast-results.json"
            bash scripts/upload-evidence.sh \
              wawagardenbar-app _compliance-docs audit_log ci-evidence/sast-results.json \
              --category security_scan ${FLAGS} || echo "Warning: Failed to upload sast-results.json"
          fi

          # Upload dependency audit (security_scan category)
          if [ -f ci-evidence/dependency-audit.json ]; then
            echo "Uploading: dependency-audit.json"
            bash scripts/upload-evidence.sh \
              wawagardenbar-app _compliance-docs audit_log ci-evidence/dependency-audit.json \
              --category security_scan ${FLAGS} || echo "Warning: Failed to upload dependency-audit.json"
          fi

          # Upload E2E test results (ci_pipeline category)
          if [ -f ci-evidence/e2e-results.json ]; then
            echo "Uploading: e2e-results.json"
            bash scripts/upload-evidence.sh \
              wawagardenbar-app _compliance-docs e2e_result ci-evidence/e2e-results.json \
              --category ci_pipeline ${FLAGS} || echo "Warning: Failed to upload e2e-results.json"
          fi

          # Upload test summary report (test_report category)
          if [ -f "compliance/test-summary-report.md" ]; then
            echo "Uploading: test-summary-report.md"
            bash scripts/upload-evidence.sh \
              wawagardenbar-app _compliance-docs compliance_document compliance/test-summary-report.md \
              --category test_report ${FLAGS} || echo "Warning: Failed to upload test-summary-report.md"
          fi

          # Upload compliance docs (planning category)
          for DOC in compliance/RTM.md compliance/test-plan.md compliance/test-cases.md; do
            if [ -f "$DOC" ]; then
              echo "Uploading: $(basename "$DOC")"
              bash scripts/upload-evidence.sh \
                wawagardenbar-app _compliance-docs compliance_document "$DOC" \
                --category planning ${FLAGS} || echo "Warning: Failed to upload $(basename "$DOC")"
            fi
          done

          # Upload release tickets
          for DIR in compliance/pending-releases compliance/approved-releases; do
            if [ -d "$DIR" ]; then
              for TICKET in "$DIR"/*.md; do
                [ -f "$TICKET" ] || continue
                echo "Uploading: $(basename "$TICKET")"
                bash scripts/upload-evidence.sh \
                  wawagardenbar-app _compliance-docs compliance_document "$TICKET" \
                  --category release_artifact ${FLAGS} || echo "Warning: Failed to upload $(basename "$TICKET")"
              done
            fi
          done

          # Upload per-requirement evidence
          for REQ_DIR in compliance/evidence/REQ-*/; do
            [ -d "$REQ_DIR" ] || continue
            REQ_ID=$(basename "$REQ_DIR")
            for ARTIFACT in "$REQ_DIR"*.md; do
              [ -f "$ARTIFACT" ] || continue
              echo "Uploading: ${REQ_ID}/$(basename "$ARTIFACT")"
              bash scripts/upload-evidence.sh \
                wawagardenbar-app "${REQ_ID}" compliance_document "$ARTIFACT" \
                --category planning ${FLAGS} || echo "Warning: Failed to upload $(basename "$ARTIFACT")"
            done
          done

      - name: Summary
        run: echo "Evidence uploaded for ${{ steps.version.outputs.version }} (UAT)"
