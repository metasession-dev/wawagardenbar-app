# Release close-out — reconcile the local compliance tree and sync main back to
# develop after a release is marked `released` on the DevAudit portal.
#
# Generated by `devaudit install` / `devaudit update` from sdlc-config.json.
# Do not edit manually — re-run the CLI (`devaudit update`) to regenerate.
#
# Triggers:
#   - repository_dispatch (type: release-closed) — sent by the DevAudit portal
#     when it advances a release to `released`. client_payload: { release,
#     release_pr }.
#   - workflow_dispatch — manual catch-up for an already-released requirement.
#
# It merges origin/main into a branch from develop (devaudit#281), runs
# scripts/close-out-release.sh for the requirement (flip the governing ticket +
# RTM, move the governing ticket to approved-releases/, and move any absorbed
# predecessor tickets to superseded-releases/), then opens one PR to develop
# containing both the main→develop sync and the compliance-tree close-out. The
# script is idempotent, so a no-op produces no PR.

name: Release Close-out

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'REQ-XXX to close out (e.g. REQ-046)'
        required: true
      release_pr:
        description: 'Release PR number or URL to backlink (optional)'
        required: false
  repository_dispatch:
    types: [release-closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  close-out:
    name: Close out release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Resolve inputs
        id: in
        run: |
          REQ="${{ github.event.inputs.release }}${{ github.event.client_payload.release }}"
          PR="${{ github.event.inputs.release_pr }}${{ github.event.client_payload.release_pr }}"
          if ! printf '%s' "$REQ" | grep -qE '^REQ-[0-9]{3,}$'; then
            echo "Standalone and integration housekeeping have no ticket/RTM close-out. No-op."
            exit 0
          fi
          echo "req=${REQ}" >> "$GITHUB_OUTPUT"
          echo "pr=${PR}" >> "$GITHUB_OUTPUT"
          # Portal base URL for the safety check (read from sdlc-config.json).
          BASE=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          echo "DEVAUDIT_BASE_URL=${BASE%/}" >> "$GITHUB_ENV"

      - name: Merge main into develop branch
        id: merge
        run: |
          # devaudit#281 — merge origin/main back into develop so the
          # reconciliation PR carries both the released code and the
          # compliance-tree close-out. Uses a non-interactive merge.
          git config user.name "devaudit-bot"
          git config user.email "devaudit-bot@users.noreply.github.com"
          git fetch origin main
          # Check if develop already contains main (nothing to merge)
          if git merge-base --is-ancestor origin/main develop; then
            echo "develop already contains origin/main — no merge needed."
            echo "merged=false" >> "$GITHUB_OUTPUT"
          else
            git merge origin/main --no-edit --no-ff
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "Merged origin/main into develop branch."
          fi

      - name: Run close-out
        id: closeout
        run: |
          chmod +x scripts/close-out-release.sh 2>/dev/null || true
          ARGS="${{ steps.in.outputs.req }}"
          [ -n "${{ steps.in.outputs.pr }}" ] && ARGS="${ARGS} --release-pr ${{ steps.in.outputs.pr }}"
          bash scripts/close-out-release.sh ${ARGS}
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to close out (idempotent no-op) — no PR opened."
          fi

      - name: Report verified manual close-out catch-up
        if: github.event_name == 'workflow_dispatch' && steps.closeout.outputs.changed != 'true' && steps.merge.outputs.merged != 'true'
        run: |
          set -euo pipefail
          REQ="${{ steps.in.outputs.req }}"
          PR_REF="${{ steps.in.outputs.pr }}"
          [ -n "$REQ" ] && [ -n "$PR_REF" ] || { echo "::error::Manual no-op reporting requires release and release_pr."; exit 1; }
          PR_JSON="$(gh pr view "$PR_REF" --repo "$GITHUB_REPOSITORY" --json mergedAt,baseRefName,headRefName,mergeCommit,number,url)"
          HEAD="$(jq -r '.headRefName // empty' <<<"$PR_JSON")"
          BASE="$(jq -r '.baseRefName // empty' <<<"$PR_JSON")"
          MERGED="$(jq -r '.mergedAt // empty' <<<"$PR_JSON")"
          SHA="$(jq -r '.mergeCommit.oid // empty' <<<"$PR_JSON")"
          NUMBER="$(jq -r '.number' <<<"$PR_JSON")"
          URL="$(jq -r '.url' <<<"$PR_JSON")"
          [ -n "$MERGED" ] && [ "$BASE" = develop ] && [ "$HEAD" = "chore/close-out-$REQ" ] && [ -n "$SHA" ] || { echo "::error::release_pr must be a merged develop close-out PR for $REQ."; exit 1; }
          BASE_URL="${DEVAUDIT_BASE_URL:-}"
          [ -n "$BASE_URL" ] && [ -n "$DEVAUDIT_API_KEY" ] || { echo "::error::DevAudit base URL and project API key are required."; exit 1; }
          RELEASE="$(curl --fail-with-body -sS -G "${BASE_URL%/}/api/ci/releases/resolve" -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" --data-urlencode "projectSlug=wgb" --data-urlencode "versionPrefix=${REQ}")"
          RELEASE_ID="$(jq -r '.latest.id // empty' <<<"$RELEASE")"
          RELEASE_VERSION="$(jq -r '.latest.version // empty' <<<"$RELEASE")"
          [ "$RELEASE_VERSION" = "$REQ" ] && [ -n "$RELEASE_ID" ] || { echo "::error::Unable to resolve $REQ."; exit 1; }
          curl --fail-with-body -sS -X POST "${BASE_URL%/}/api/ci/releases/${RELEASE_ID}/close-out" -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" -H 'Content-Type: application/json' --data "$(jq -nc --arg workflowRunId '${{ github.run_id }}' --arg workflowUrl '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' --arg pullRequestUrl "$URL" --arg mergeSha "$SHA" --argjson pullRequestNumber "$NUMBER" '{status:"completed",workflowRunId:$workflowRunId,workflowUrl:$workflowUrl,pullRequestNumber:$pullRequestNumber,pullRequestUrl:$pullRequestUrl,mergeSha:$mergeSha}')"

      - name: Close existing sync PRs for same REQ
        if: steps.closeout.outputs.changed == 'true' || steps.merge.outputs.merged == 'true'
        run: |
          # devaudit#281 — if an older same-REQ sync PR is already open,
          # close it as superseded instead of leaving duplicate sync PRs.
          REQ="${{ steps.in.outputs.req }}"
          # Look for open PRs targeting develop that mention this REQ in the title
          EXISTING_PRS=$(gh pr list --base develop --state open --json number,title --jq '.[] | select(.title | test("'"${REQ}"'")) | .number' 2>/dev/null || true)
          for PR_NUM in $EXISTING_PRS; do
            echo "Closing existing PR #${PR_NUM} as superseded by automated close-out for ${REQ}"
            gh pr close ${PR_NUM} --comment "Superseded by automated release close-out for ${REQ}. This PR is no longer needed — the reconciliation is handled by the Release Close-out workflow." 2>/dev/null || true
          done

      - name: Open close-out PR
        if: steps.closeout.outputs.changed == 'true' || steps.merge.outputs.merged == 'true'
        run: |
          REQ="${{ steps.in.outputs.req }}"
          # Source the shared close-out contract for the branch prefix and marker
          source scripts/close-out-contract.sh 2>/dev/null || true
          BRANCH="${CLOSEOUT_BRANCH_PREFIX}${REQ}"
          # Fallback if contract script not available
          [ -z "$BRANCH" ] && BRANCH="chore/close-out-${REQ}"
          git config user.name "devaudit-bot"
          git config user.email "devaudit-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          # Build the close-out marker
          MARKER=$(closeout_marker "${REQ}" 2>/dev/null || echo "Release-Closeout: ${REQ}")
          git commit -m "docs(compliance): close out ${REQ} release — sync main + reconcile (RELEASED)

          ${MARKER}

          Automated reconciliation after the DevAudit portal marked ${REQ} released.
          Includes:
          - main → develop sync
          - release ticket moved to approved-releases/
          - release ticket status → RELEASED
          - RTM row → RELEASED
          - absorbed predecessor tickets → superseded-releases/ (if the bundle manifest listed any)

          Ref: ${REQ}"
          git push -u origin "$BRANCH" --force-with-lease
          PR_BODY="Automated close-out — the DevAudit portal marked **${REQ}** \`released\`.

          ${MARKER}

          This PR includes:
          - **main → develop reconciliation** — merges released code back into develop
          - **release ticket** moved to \`approved-releases/\`, status \`RELEASED\`
          - **RTM row** flipped to \`RELEASED\`
          - **absorbed predecessor tickets** moved to \`superseded-releases/\` when the release bundle lists them

          Review + merge to develop."
          gh pr create --base develop --head "$BRANCH" \
            --title "docs(compliance): close out ${REQ} — sync main + reconcile (RELEASED)" \
            --body "$PR_BODY" \
            || echo "::warning::PR may already exist for ${BRANCH}."
