# Compliance Evidence Upload — triggers on compliance-only changes
#
# Generated by `devaudit install` / `devaudit update` from sdlc-config.json.
# Do not edit manually — re-run the CLI (`devaudit update`) to regenerate.
#
# Uploads compliance docs to DevAudit without running quality gates.
# Complements ci.yml which skips compliance-only pushes via paths-ignore.
# In sdlc-v1.22.0+ this workflow is the load-bearing path for Stage 3
# Step 9 (push-early): every commit on develop that touches compliance/
# fires this and uploads to DevAudit immediately so destination breakage
# (dead alias, missing token, schema drift) surfaces in seconds, not at
# the end of Stage 3.
#
# Auth: project-scoped API key (uploader role). Issue from
# DevAudit → Project Settings → API Keys. Set as repo Secret
# DEVAUDIT_API_KEY. Base URL is read from sdlc-config.json
# devaudit.base_url; falls back to repo Variable DEVAUDIT_BASE_URL
# (deprecated, removed in v1.23.0).

name: Compliance Evidence Upload

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'compliance/**'
  # devaudit-installer#149 — listen for completion of the E2E Regression
  # workflow so the critical-tier run on the release PR + the full
  # regression on post-merge to main both upload their JSON results +
  # HTML report to the portal under the right release. Without this hook
  # the UAT four-eyes reviewer only sees smoke-tier evidence from the
  # feature PR's develop merge — the broader sweep against the
  # about-to-be-promoted integration code never reaches the portal.
  workflow_run:
    workflows: ['E2E Regression']
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.workflow_run.id || '' }}
  cancel-in-progress: true

jobs:
  upload-compliance-evidence:
    name: Upload Compliance Evidence
    # devaudit-installer#149 — only the push/dispatch paths run the
    # compliance-doc upload. The workflow_run path is handled by the
    # sibling job below; running both on a workflow_run event would
    # double-upload every compliance doc.
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    # Permissions are needed because the "Auto-generate housekeeping stubs"
    # step pushes a new branch + opens a PR via `gh pr create` when the
    # current push triggers a housekeeping release (vYYYY.MM.DD) that
    # doesn't yet have its stub release-ticket on disk. Without these
    # the github-actions[bot] token gets HTTP 403 on the push + on the PR
    # create, and the auto-housekeeping path silently leaves a red badge
    # on every docs-only / chore push.
    #
    # `DEVAUDIT_USER_TOKEN` is no longer consulted by this workflow (the
    # auto-stub step now uses `github.token` directly — see the env block
    # on that step). The permissions below grant everything `gh pr create`
    # needs; preferring a (potentially stale) PAT was the cause of the
    # 2026-06-07 401 chain on this issue.
    permissions:
      contents: write # push the auto-PR branch
      pull-requests: write # gh pr create
    env:
      DEVAUDIT_BASE_URL_VAR: ${{ vars.DEVAUDIT_BASE_URL }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `req_meta_args` can `git log --grep "[REQ-XXX]|Ref: REQ-XXX"`
          # against the implementation commits (the merge commit alone never
          # carries the REQ tag in a feature → develop PR flow, so without this
          # the change_type derivation is null nearly everywhere — #77).
          fetch-depth: 0

      - name: Resolve DevAudit base URL
        id: resolve
        run: |
          # Prefer sdlc-config.json (visible in PR review) over repo Variable.
          CONFIG_URL=""
          if [ -f sdlc-config.json ]; then
            CONFIG_URL=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          fi
          if [ -n "$CONFIG_URL" ]; then
            BASE="$CONFIG_URL"
            echo "Using devaudit.base_url from sdlc-config.json: $BASE"
          elif [ -n "$DEVAUDIT_BASE_URL_VAR" ]; then
            BASE="$DEVAUDIT_BASE_URL_VAR"
            echo "::warning::Using repo Variable DEVAUDIT_BASE_URL (deprecated in v1.23.0). Move base_url to sdlc-config.json devaudit.base_url for PR-visible config."
          else
            echo "::warning::No DevAudit base URL configured — skipping evidence upload. Set devaudit.base_url in sdlc-config.json."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${DEVAUDIT_API_KEY}" ]; then
            echo "::warning::DEVAUDIT_API_KEY not set — skipping evidence upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pre-flight: confirm destination is reachable. Catches dead aliases / wrong hosts early.
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 -I "${BASE%/}/" || echo "000")
          case "$CODE" in
            2*|3*)
              echo "DevAudit reachable at ${BASE} (HTTP ${CODE})"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "BASE=${BASE%/}" >> "$GITHUB_ENV"
              # Export for upload-evidence.sh, which reads $DEVAUDIT_BASE_URL directly.
              echo "DEVAUDIT_BASE_URL=${BASE%/}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::DevAudit base URL ${BASE} returned HTTP ${CODE}. Likely a stale alias or wrong host. Check sdlc-config.json devaudit.base_url."
              exit 1
              ;;
          esac

      - name: Determine release version
        id: version
        if: steps.resolve.outputs.skip != 'true'
        run: |
          # Release identity is the REQ tag on the latest commit
          # ([REQ-XXX] in subject, Ref: REQ-XXX in body), with a bare-date
          # fallback for housekeeping commits. Both this workflow and
          # ci.yml call the same helper so a single feature converges on
          # one release record regardless of whether the push touched
          # code or docs. See DevAudit #310.
          chmod +x scripts/derive-release-version.sh 2>/dev/null || true
          VERSION=$(./scripts/derive-release-version.sh)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      # Housekeeping artefact auto-generation (DevAudit-Installer#116 WS3+WS4)
      #
      # Housekeeping releases (bare-date version) need two operator-authored
      # artefacts to clear the portal's release-completeness checklist:
      # `RELEASE-TICKET-<version>.md` and `security-summary-<version>.md`.
      # When the version resolves to a bare-date AND those artefacts don't
      # already exist on develop, generate stubs from the CI gate JSON and
      # open a PR that the operator reviews + signs off + merges. Once
      # merged, the next compliance-evidence.yml run uploads them as
      # evidence and the matrix flips both items to ✓.
      #
      # Mirrors the `incident-export.yml` pattern: auto-PR, operator fills
      # in sign-off, merge to land.
      - name: Auto-generate housekeeping stubs (if needed)
        if: steps.resolve.outputs.skip != 'true'
        env:
          # Use the workflow's GITHUB_TOKEN directly. The `permissions:`
          # block on the job grants `contents: write` + `pull-requests:
          # write`, which is everything `gh pr create` + `git push` need
          # here. The earlier `secrets.DEVAUDIT_USER_TOKEN || github.token`
          # fallback became a foot-gun once that permissions block landed
          # — when an operator had set `DEVAUDIT_USER_TOKEN` historically
          # (to work around the missing permissions) and the PAT later
          # expired, every `gh pr create` 401'd as the workflow preferred
          # the stale PAT over the live bot token. See DevAudit-Installer#122
          # 2026-06-07 escalation. Orgs with policy that blocks the bot
          # token from creating PRs can override per-workflow on their
          # own; the canonical default no longer prefers a PAT.
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Guard: only fire for bare-date (housekeeping) versions.
          if ! [[ "$VERSION" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "Version ${VERSION} is not housekeeping; skipping stub generation."
            exit 0
          fi
          TICKET_PATH="compliance/pending-releases/RELEASE-TICKET-${VERSION}.md"
          SECSUM_PATH="compliance/security-summary-${VERSION}.md"
          # Skip when both stubs already exist (this branch already carries
          # them, or a prior run already opened the PR and the artefacts
          # have since merged).
          if [ -f "$TICKET_PATH" ] && [ -f "$SECSUM_PATH" ]; then
            echo "Housekeeping stubs already present for ${VERSION}; nothing to generate."
            exit 0
          fi
          chmod +x scripts/generate-housekeeping-release-ticket.sh 2>/dev/null || true
          chmod +x scripts/generate-security-summary.sh 2>/dev/null || true
          mkdir -p compliance/pending-releases
          # Generate any missing stubs. Each generator is independent so a
          # partial-state branch (e.g. ticket already merged but security-
          # summary still missing) only writes the missing half.
          if [ ! -f "$TICKET_PATH" ]; then
            bash scripts/generate-housekeeping-release-ticket.sh "$VERSION" > "$TICKET_PATH"
            echo "Wrote $TICKET_PATH"
          fi
          if [ ! -f "$SECSUM_PATH" ]; then
            bash scripts/generate-security-summary.sh "$VERSION" > "$SECSUM_PATH"
            echo "Wrote $SECSUM_PATH"
          fi
          # Open the auto-PR. force-with-lease so re-runs on the same
          # bare-date version update the same branch in place.
          BRANCH="chore/housekeeping-release-${VERSION}"
          git config user.name 'devaudit-bot'
          git config user.email 'devaudit-bot@users.noreply.github.com'
          git fetch origin develop
          git checkout -B "${BRANCH}" origin/develop
          # Re-write under the new branch (the checkout above resets the
          # working tree — regenerate so the commit captures the stubs).
          if [ ! -f "$TICKET_PATH" ]; then
            bash scripts/generate-housekeeping-release-ticket.sh "$VERSION" > "$TICKET_PATH"
          fi
          if [ ! -f "$SECSUM_PATH" ]; then
            bash scripts/generate-security-summary.sh "$VERSION" > "$SECSUM_PATH"
          fi
          git add "$TICKET_PATH" "$SECSUM_PATH"
          if git diff --cached --quiet; then
            echo "No change — stubs already on develop."
            exit 0
          fi
          git commit -m "chore: housekeeping release-ticket stub + security-summary for ${VERSION}" \
            -m "Auto-generated by compliance-evidence.yml (DevAudit-Installer#116)." \
            -m "" \
            -m "REPLACE markers in the Risk Assessment + Sign-off blocks require operator review before merge."
          git push --force-with-lease origin "${BRANCH}"
          EXISTING=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number' || true)
          if [ -z "$EXISTING" ]; then
            gh pr create --base develop --head "${BRANCH}" \
              --title "chore(housekeeping): release-ticket + security-summary stubs for ${VERSION}" \
              --body "Auto-generated by the \`Compliance Evidence Upload\` workflow when develop received a housekeeping push (no \`REQ-XXX\` in commit subjects; version derived as bare-date \`${VERSION}\`).\n\n**Files added:**\n- \`${TICKET_PATH}\` — release ticket stub with commit summary + sign-off block\n- \`${SECSUM_PATH}\` — security summary stub scraping SAST + dep-audit gate JSON\n\n**Required before merge:**\n- [ ] Replace \`REPLACE — …\` markers in the **Summary**, **Risk Assessment**, and **Sign-off** blocks on both files\n- [ ] Confirm the auto-scraped SAST + dep-audit counts match what the gate panel shows\n- [ ] Add reviewer sign-off (operator name + date)\n\nOnce merged, the next \`compliance-evidence.yml\` run uploads both artefacts as evidence and the portal's release-completeness checklist flips the **Security summary present** + **Release ticket present** items to ✓.\n\nSee [stage-3 SDLC doc \"Housekeeping releases\" section](../SDLC/3-compile-evidence.md) for the full operator walkthrough."
          else
            echo "PR #${EXISTING} already open for ${VERSION} — branch updated in place."
          fi

      - name: Upload compliance documents
        if: steps.resolve.outputs.skip != 'true'
        run: |
          chmod +x scripts/upload-evidence.sh 2>/dev/null || true
          # Common flags WITHOUT --release. Each upload appends its OWN
          # --release so per-requirement artifacts land in their own release
          # record (version = REQ-ID) instead of all collapsing into whichever
          # single version the triggering commit derived. DevAudit #135 follow-
          # up: this fixes release *attribution* (not just duplication) — an
          # untagged docs commit must not sweep every in-scope REQ into a date
          # release. Note: upload-evidence.sh keeps the LAST --release seen.
          FLAGS="--git-sha ${{ github.sha }} --ci-run-id ${{ github.run_id }} --branch ${{ github.ref_name }}"
          FLAGS="${FLAGS} --create-release-if-missing --environment uat --sdlc-stage 3"
          DERIVED_RELEASE="${{ steps.version.outputs.version }}"

          # Derive change_type for the bare-date (housekeeping) DERIVED_RELEASE:
          # the prefix of the most recent commit's subject. No-op for tracked
          # releases — they get per-REQ derivation in the loop below.
          DERIVED_CT=$(git log -1 --pretty=%s 2>/dev/null \
            | grep -oE '^(feat|fix|refactor|perf|chore|docs|ci|build|test|compliance|revert)' \
            | head -1 || true)
          DERIVED_META=()
          [ -n "$DERIVED_CT" ] && DERIVED_META+=(--change-type "$DERIVED_CT")

          # Upload planning docs (RTM / Test Plan / Test Cases) as
          # compliance_document — they surface under the Documents tab.
          for DOC in compliance/RTM.md compliance/test-plan.md compliance/test-cases.md; do
            if [ -f "$DOC" ]; then
              echo "Uploading: $(basename "$DOC")"
              bash scripts/upload-evidence.sh \
                wgb _compliance-docs compliance_document "$DOC" \
                --category planning ${FLAGS} --release "${DERIVED_RELEASE}" \
                "${DERIVED_META[@]}" \
                || echo "Warning: Failed to upload $(basename "$DOC")"
            fi
          done

          # Project-level Test Summary Report — a hand-authored baseline
          # describing the project's testing posture. As of v0.1.32 this is
          # uploaded as `compliance_document` (NOT `test_report`) — the
          # per-release Test Reports gate is now satisfied by the per-REQ
          # `test-execution-summary.md` uploaded in the in-scope-requirements
          # loop below, which carries fresh release-specific data. The
          # project-level TSR continues to ship as a Documents-tab baseline
          # but no longer poses as per-release test evidence.
          # See DevAudit-Installer#101.
          if [ -f "compliance/test-summary-report.md" ]; then
            echo "Uploading: test-summary-report.md (compliance_document — baseline)"
            bash scripts/upload-evidence.sh \
              wgb _compliance-docs compliance_document compliance/test-summary-report.md \
              --category planning ${FLAGS} --release "${DERIVED_RELEASE}" \
              "${DERIVED_META[@]}" \
              || echo "Warning: Failed to upload test-summary-report.md"
          fi

          # Tier 3 per-event governance docs (devaudit#370 Phase 3a, narrowed
          # in v0.1.39). Only periodic-review and incident-report are CI-uploaded
          # — both are auto-generated by other workflows (periodic-review by the
          # quarterly cron, incident-report by the incident-export workflow).
          #
          # Tier 1/2 governance docs (Test_Policy, AGENT, INSTRUCTIONS,
          # Test_Strategy, Test_Architecture, Periodic_Security_Review_Schedule,
          # ROPA, DPIA, AI Disclosure) are operator-uploaded via the portal
          # Upload Evidence form. CI auto-upload was removed because placeholder
          # starter content was landing as canonical evidence; the portal form
          # ensures the operator reviews each refresh before it counts.
          upload_governance() {
            local FILE="$1" TYPE="$2"
            if [ ! -f "$FILE" ]; then return 0; fi
            echo "Uploading governance: $(basename "$FILE") (type=${TYPE})"
            bash scripts/upload-evidence.sh \
              wgb _compliance-docs "$TYPE" "$FILE" \
              --category planning ${FLAGS} --release "${DERIVED_RELEASE}" \
              "${DERIVED_META[@]}" \
              || echo "Warning: Failed to upload $(basename "$FILE")"
          }
          # Recognise governance docs at top-level OR under compliance/governance/
          # (operator's choice — both layouts are common).
          upload_governance compliance/periodic-review.md             periodic_review
          upload_governance compliance/governance/periodic-review.md  periodic_review
          # Incident reports: glob `incident-report*.md` so per-incident
          # files (e.g. `incident-report-2026-001.md`, written by
          # incident-export.yml from labelled GitHub issues) all
          # upload as real evidence. The unedited starter
          # `incident-report.md` matches the glob too but is skipped
          # by upload-evidence.sh's central stub guard — so the stub
          # can never flip ISO29119.3.5.4 to COVERED on its own
          # (devaudit#133). `*.md` does not match `*.md.template`.
          shopt -s nullglob
          for f in compliance/incident-report*.md compliance/governance/incident-report*.md; do
            upload_governance "$f" incident_report
          done
          shopt -u nullglob

          # ── Audit-log export (DevAudit-Installer#98 WS2) ──────────────
          # Snapshot the portal's audit log for the rolling 90-day window
          # and upload as `evidence_type=audit_log`. Closes three
          # framework-coverage clauses on every release:
          #   - ISO27001.A.8.16 — Monitoring activities
          #   - EUAIA.Art-12   — Record-keeping (automatic logging)
          #   - GDPR.Art-32    — Security of processing (audit-log half)
          #
          # The portal endpoint defaults to the last 90 days when no
          # `since`/`until` query params are passed; omit them so the
          # consumer side stays zero-config. Endpoint shipped in
          # META-COMPLY PR #413; project-scoped API key (uploader role)
          # already has read access via `resolveCiUploadAuth`.
          AUDIT_LOG_FILE="$(mktemp -t audit-log-XXXXXX.json)"
          if curl -sSf -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" \
            "${DEVAUDIT_BASE_URL%/}/api/ci/projects/wgb/audit-log/export" \
            -o "$AUDIT_LOG_FILE"; then
            echo "Uploading: audit-log.json (audit_log — 90-day window)"
            bash scripts/upload-evidence.sh \
              wgb _compliance-docs audit_log "$AUDIT_LOG_FILE" \
              --category compliance_document ${FLAGS} --release "${DERIVED_RELEASE}" \
              "${DERIVED_META[@]}" \
              || echo "Warning: Failed to upload audit-log.json"
          else
            # Soft-fail: an export hiccup shouldn't break the rest of the
            # evidence pipeline. Surfaces as a warning in the workflow log;
            # the framework-coverage panel will show MISSING for the three
            # clauses above until the next successful upload.
            echo "::warning::Audit-log export failed — endpoint unreachable or 4xx/5xx. Three framework-coverage clauses (ISO27001.A.8.16, EUAIA.Art-12, GDPR.Art-32 audit-log half) will stay MISSING until the next run."
          fi
          rm -f "$AUDIT_LOG_FILE"

          # Helper: emit a `--release-title …` `--change-type …` pair for a given
          # REQ, derived from its pending release-ticket H1 and the most recent
          # commit attributed to that REQ. Empty pair when neither is available.
          req_meta_args() {
            local REQ="$1"; local TITLE=""; local CT=""
            for FILE in "compliance/pending-releases/RELEASE-TICKET-${REQ}.md" \
                        "compliance/approved-releases/RELEASE-TICKET-${REQ}.md"; do
              if [ -f "$FILE" ]; then
                TITLE=$(grep -m1 '^# ' "$FILE" \
                  | sed -E 's/^# *(REQ-[0-9]+)?[[:space:]]*[—:-]?[[:space:]]*//')
                break
              fi
            done
            CT=$(git log --grep "\[${REQ}\]\|Ref: ${REQ}" --pretty=%s -1 2>/dev/null \
              | grep -oE '^(feat|fix|refactor|perf|chore|docs|ci|build|test|compliance|revert)' \
              | head -1 || true)
            # Use if/then/fi (not `[ … ] && cmd`) — under bash -eo pipefail a
            # trailing `[ … ] && cmd` whose test fails returns 1, and the
            # function inherits that exit code; calling via $(req_meta_args …)
            # then aborts the step silently (DevAudit-Installer#77).
            if [ -n "$TITLE" ]; then printf -- '--release-title %q ' "$TITLE"; fi
            if [ -n "$CT" ]; then printf -- '--change-type %q ' "$CT"; fi
          }

          # Upload release tickets (pending only)
          if [ -d "compliance/pending-releases" ]; then
            for TICKET in compliance/pending-releases/*.md; do
              [ -f "$TICKET" ] || continue
              # A RELEASE-TICKET-REQ-XXX.md belongs to that requirement's
              # release record; any other ticket rides the derived release.
              TICKET_BASE=$(basename "$TICKET" .md)
              case "$TICKET_BASE" in
                RELEASE-TICKET-REQ-*)
                  TICKET_REQ="${TICKET_BASE#RELEASE-TICKET-}"
                  TICKET_OWNER="$TICKET_REQ"; TICKET_RELEASE="$TICKET_REQ"
                  TICKET_META_ARGS=$(req_meta_args "$TICKET_REQ") ;;
                *)
                  TICKET_OWNER="_compliance-docs"; TICKET_RELEASE="$DERIVED_RELEASE"
                  TICKET_META_ARGS="" ;;
              esac
              echo "Uploading: $(basename "$TICKET") -> release ${TICKET_RELEASE}"
              eval "bash scripts/upload-evidence.sh \
                wgb \"${TICKET_OWNER}\" compliance_document \"$TICKET\" \
                --category release_artifact ${FLAGS} --release \"${TICKET_RELEASE}\" \
                ${TICKET_META_ARGS}" \
                || echo "Warning: Failed to upload $(basename "$TICKET")"
            done
          fi

          # Upload per-requirement evidence — scoped to requirements with a
          # pending release ticket. Without this scoping every historical
          # compliance/evidence/REQ-*/ folder would be re-uploaded on every
          # run, re-populating the release-requirement matrix with the full
          # project catalogue (DevAudit #135, sibling of #133).
          IN_SCOPE_REQS=()
          if [ -d compliance/pending-releases ]; then
            for TICKET in compliance/pending-releases/RELEASE-TICKET-REQ-*.md; do
              [ -f "$TICKET" ] || continue
              REQ_ID=$(basename "$TICKET" .md | sed 's/^RELEASE-TICKET-//')
              IN_SCOPE_REQS+=("$REQ_ID")
            done
          fi

          if [ ${#IN_SCOPE_REQS[@]} -eq 0 ]; then
            echo "No pending release tickets found — skipping per-requirement evidence upload"
          else
            echo "In-scope requirements for this release: ${IN_SCOPE_REQS[*]}"
            for REQ_ID in "${IN_SCOPE_REQS[@]}"; do
              REQ_DIR="compliance/evidence/${REQ_ID}/"
              if [ ! -d "$REQ_DIR" ]; then
                echo "Warning: pending ticket for ${REQ_ID} but no ${REQ_DIR} on disk"
                continue
              fi
              REQ_META_ARGS=$(req_meta_args "$REQ_ID")
              for ARTIFACT in "$REQ_DIR"*.md; do
                [ -f "$ARTIFACT" ] || continue
                # Per-REQ basename → (evidence_type, evidence_category) routing.
                # The bare default (compliance_document, planning) is the
                # historical catch-all; the named cases route specific
                # artefacts to their dedicated evidence types so the portal's
                # framework-coverage matrix attributes them correctly:
                #
                #   - test-execution-summary.md / test-summary-report.md
                #       → test_report : ISO 29119-3 §3.5.6 Test Completion
                #         Report per release cycle. Satisfies the portal's
                #         Test Reports gate with per-release evidence
                #         instead of the project-level evergreen TSR (which
                #         from v0.1.32 downgrades to compliance_document).
                #         DevAudit-Installer#101.
                #
                #   - srs-alignment.md
                #       → srs_alignment : output of the requirements-aligner
                #         skill at Stage 3. Orphan-by-design at v1 per
                #         META-COMPLY framework-registry-auditor review;
                #         surfaces in Documents tab + audit-pack export.
                #         DevAudit-Installer#119.
                #
                #   - architecture-decision.md
                #       → architecture_decision : output of the adr-author
                #         skill at Stage 3. Closes ISO 27001 A.8.25 (Secure
                #         development life cycle) via the dedicated type
                #         predicate. DevAudit-Installer#120.
                #
                #   - risk-assessment.md
                #       → risk_assessment : output of the risk-register-keeper
                #         skill at Stage 3. Closes SOC 2 CC3.2 (Risk
                #         identification and assessment) via the dedicated
                #         type predicate. DevAudit-Installer#121.
                #
                # Until this routing existed the new artefacts uploaded as
                # compliance_document, which matches the project-baseline
                # docs predicate but NOT the per-REQ Tier 3 clause
                # predicates that expect the dedicated types — so the matrix
                # reported MISSING / PARTIAL for SOC2.CC3.2 + ISO27001.A.8.25
                # despite the files being present. DevAudit-Installer#146.
                BASENAME=$(basename "$ARTIFACT")
                case "$BASENAME" in
                  test-execution-summary.md|test-summary-report.md)
                    EVTYPE=test_report; EVCAT=test_report ;;
                  srs-alignment.md)
                    EVTYPE=srs_alignment; EVCAT=planning ;;
                  architecture-decision.md)
                    EVTYPE=architecture_decision; EVCAT=planning ;;
                  risk-assessment.md)
                    EVTYPE=risk_assessment; EVCAT=planning ;;
                  *)
                    EVTYPE=compliance_document; EVCAT=planning ;;
                esac
                echo "Uploading: ${REQ_ID}/${BASENAME} (${EVTYPE})"
                eval "bash scripts/upload-evidence.sh \
                  wgb \"${REQ_ID}\" ${EVTYPE} \"$ARTIFACT\" \
                  --category ${EVCAT} ${FLAGS} --release \"${REQ_ID}\" \
                  ${REQ_META_ARGS}" \
                  || echo "Warning: Failed to upload ${BASENAME}"
              done
            done
          fi

      - name: Summary
        run: echo "Compliance evidence uploaded for ${{ steps.version.outputs.version }}"

  # devaudit-installer#149 — upload the E2E Regression artefacts to the
  # portal so the critical-tier run on the release PR + the full
  # regression on post-merge to main both land as portal evidence (not
  # just GitHub Actions artifacts).
  #
  # Fires only on `workflow_run` events. The triggering workflow is the
  # consumer's `E2E Regression` (project-owned per the v0.1.53 3-tier
  # gating model) which writes:
  #   - e2e-regression-results.json (Playwright JSON reporter)
  #   - playwright-report/          (HTML report)
  #   - test-results/               (per-spec traces / videos / screenshots)
  # to GitHub Actions artifact storage under the name `e2e-regression-report`.
  # We download that artifact via the workflow_run.id, derive the release
  # version against the triggering run's head_sha, then upload the
  # canonical artefacts as `evidence_type=e2e_result` + `test_report`
  # against each in-scope REQ.
  upload-e2e-regression-evidence:
    name: Upload E2E Regression Evidence
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    # actions: read is required so `actions/download-artifact@v8` with
    # `run-id` can read another workflow's artifacts. Without it the
    # download step fails with a 404 even when the artifact exists.
    permissions:
      contents: read
      actions: read
    env:
      DEVAUDIT_BASE_URL_VAR: ${{ vars.DEVAUDIT_BASE_URL }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the SHA the E2E Regression ran against — that
          # determines the release version + the in-scope REQs via the
          # pending release tickets at that snapshot, not whatever
          # default branch currently points to.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve DevAudit base URL
        id: resolve
        run: |
          CONFIG_URL=""
          if [ -f sdlc-config.json ]; then
            CONFIG_URL=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          fi
          if [ -n "$CONFIG_URL" ]; then
            BASE="$CONFIG_URL"
          elif [ -n "$DEVAUDIT_BASE_URL_VAR" ]; then
            BASE="$DEVAUDIT_BASE_URL_VAR"
          else
            echo "::warning::No DevAudit base URL configured — skipping E2E evidence upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${DEVAUDIT_API_KEY}" ]; then
            echo "::warning::DEVAUDIT_API_KEY not set — skipping E2E evidence upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "DEVAUDIT_BASE_URL=${BASE%/}" >> "$GITHUB_ENV"

      - name: Download E2E Regression artifact
        if: steps.resolve.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          name: e2e-regression-report
          path: e2e-artifacts/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Derive release version
        if: steps.resolve.outputs.skip != 'true'
        id: version
        run: |
          chmod +x scripts/derive-release-version.sh 2>/dev/null || true
          VERSION=$(./scripts/derive-release-version.sh)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${VERSION}"

      - name: Upload E2E Regression evidence to DevAudit
        if: steps.resolve.outputs.skip != 'true'
        run: |
          set -euo pipefail
          DERIVED_RELEASE="${{ steps.version.outputs.version }}"

          # Tier metadata for the portal (the operator filters/groups by
          # this on the release detail). pull_request → critical;
          # push to main → regression; otherwise dispatch/schedule.
          PRIOR_EVENT="${{ github.event.workflow_run.event }}"
          PRIOR_BRANCH="${{ github.event.workflow_run.head_branch }}"
          case "$PRIOR_EVENT" in
            pull_request) TIER=critical; STAGE=2 ;;
            push)         TIER=regression; STAGE=5 ;;
            *)            TIER="${PRIOR_EVENT}"; STAGE="" ;;
          esac

          # Common flags for upload-evidence.sh. Branch + SHA come from
          # the triggering run, not from this workflow_run dispatch.
          FLAGS="--create-release-if-missing --environment uat \
                 --git-sha ${{ github.event.workflow_run.head_sha }} \
                 --ci-run-id ${{ github.event.workflow_run.id }} \
                 --branch ${PRIOR_BRANCH}"
          [ -n "$STAGE" ] && FLAGS="${FLAGS} --sdlc-stage ${STAGE}"

          # In-scope REQs from pending release tickets at the triggering
          # SHA. Fall back to `_compliance-docs` if no tickets present so
          # the artefact at least lands somewhere visible.
          REQS=()
          if [ -d compliance/pending-releases ]; then
            for TICKET in compliance/pending-releases/RELEASE-TICKET-REQ-*.md; do
              [ -f "$TICKET" ] || continue
              REQS+=("$(basename "$TICKET" .md | sed 's/^RELEASE-TICKET-//')")
            done
          fi
          if [ "${#REQS[@]}" -eq 0 ]; then
            REQS=(_compliance-docs)
          fi
          echo "Uploading E2E ${TIER}-tier evidence to: ${REQS[*]} (release: ${DERIVED_RELEASE})"

          UPLOAD_FAILURES=0
          for REQ in "${REQS[@]}"; do
            # 1. JSON reporter output → e2e_result. The single canonical
            # machine-readable artefact for the run.
            if [ -f e2e-artifacts/e2e-regression-results.json ]; then
              if bash scripts/upload-evidence.sh \
                wgb "$REQ" e2e_result \
                e2e-artifacts/e2e-regression-results.json \
                --category test_report ${FLAGS} --release "${DERIVED_RELEASE}" \
                --meta-key "tier=${TIER}"
              then
                :
              else
                echo "::warning::e2e_result upload failed for ${REQ}"
                UPLOAD_FAILURES=$((UPLOAD_FAILURES + 1))
              fi
            fi
            # 2. Playwright HTML report index → test_report. Operator-
            # facing artefact (the formatted run summary). Skipped if
            # the report directory is missing (e.g. an upstream
            # infrastructure failure aborted before reporting).
            if [ -d e2e-artifacts/playwright-report ]; then
              (cd e2e-artifacts && zip -qr playwright-report.zip playwright-report/) 2>/dev/null || true
            fi
            if [ -f e2e-artifacts/playwright-report.zip ]; then
              # DevAudit-Installer#189 — the Playwright HTML report zip
              # (~50–100MB) exceeds the portal's multipart body parser
              # limit. The JSON results above are the canonical evidence;
              # the HTML report is a human-facing convenience. Soft-fail
              # so the job doesn't block on a portal-side size limit.
              # Once the portal's presigned R2 URL flow is live (#189
              # Option C), this can be reverted to a hard fail.
              if bash scripts/upload-evidence.sh \
                wgb "$REQ" test_report \
                e2e-artifacts/playwright-report.zip \
                --category test_report ${FLAGS} --release "${DERIVED_RELEASE}" \
                --meta-key "tier=${TIER}"
              then
                :
              else
                echo "::warning::playwright HTML report upload failed for ${REQ} (non-blocking — JSON results are canonical evidence)"
              fi
            fi
          done

          # Per-spec failure screenshots from test-results/ are NOT
          # uploaded: Playwright names them `test-failed-1.png` /
          # `test-finished-1.png`, which the portal's filename
          # validator (REQ-XXX-AC<n>-<slug>.png) rejects. Use the
          # evidenceShot(page, REQ, AC, slug) helper from the
          # e2e-test-engineer skill for per-AC named captures; those
          # upload via ci.yml's per-REQ screenshot loop.

          if [ "$UPLOAD_FAILURES" -gt 0 ]; then
            echo "::error::${UPLOAD_FAILURES} E2E evidence upload(s) failed — portal release matrix may be incomplete"
            exit 1
          fi
          echo "E2E ${TIER}-tier evidence uploaded for ${#REQS[@]} requirement(s)"
