# Compliance Evidence Upload ŌĆö triggers on compliance-only changes
#
# Generated by `devaudit install` / `devaudit update` from sdlc-config.json.
# Do not edit manually ŌĆö re-run the CLI (`devaudit update`) to regenerate.
#
# Uploads compliance docs to DevAudit without running quality gates.
# Complements ci.yml which skips compliance-only pushes via paths-ignore.
# In sdlc-v1.22.0+ this workflow is the load-bearing path for Stage 3
# Step 9 (push-early): every commit on develop that touches compliance/
# fires this and uploads to DevAudit immediately so destination breakage
# (dead alias, missing token, schema drift) surfaces in seconds, not at
# the end of Stage 3.
#
# Auth: project-scoped API key (uploader role). Issue from
# DevAudit ŌåÆ Project Settings ŌåÆ API Keys. Set as repo Secret
# DEVAUDIT_API_KEY. Base URL is read from sdlc-config.json
# devaudit.base_url; falls back to repo Variable DEVAUDIT_BASE_URL
# (deprecated, removed in v1.23.0).

name: Compliance Evidence Upload

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'compliance/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload-compliance-evidence:
    name: Upload Compliance Evidence
    runs-on: ubuntu-latest
    env:
      DEVAUDIT_BASE_URL_VAR: ${{ vars.DEVAUDIT_BASE_URL }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `req_meta_args` can `git log --grep "[REQ-XXX]|Ref: REQ-XXX"`
          # against the implementation commits (the merge commit alone never
          # carries the REQ tag in a feature ŌåÆ develop PR flow, so without this
          # the change_type derivation is null nearly everywhere ŌĆö #77).
          fetch-depth: 0

      - name: Resolve DevAudit base URL
        id: resolve
        run: |
          # Prefer sdlc-config.json (visible in PR review) over repo Variable.
          CONFIG_URL=""
          if [ -f sdlc-config.json ]; then
            CONFIG_URL=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          fi
          if [ -n "$CONFIG_URL" ]; then
            BASE="$CONFIG_URL"
            echo "Using devaudit.base_url from sdlc-config.json: $BASE"
          elif [ -n "$DEVAUDIT_BASE_URL_VAR" ]; then
            BASE="$DEVAUDIT_BASE_URL_VAR"
            echo "::warning::Using repo Variable DEVAUDIT_BASE_URL (deprecated in v1.23.0). Move base_url to sdlc-config.json devaudit.base_url for PR-visible config."
          else
            echo "::warning::No DevAudit base URL configured ŌĆö skipping evidence upload. Set devaudit.base_url in sdlc-config.json."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${DEVAUDIT_API_KEY}" ]; then
            echo "::warning::DEVAUDIT_API_KEY not set ŌĆö skipping evidence upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pre-flight: confirm destination is reachable. Catches dead aliases / wrong hosts early.
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 10 -I "${BASE%/}/" || echo "000")
          case "$CODE" in
            2*|3*)
              echo "DevAudit reachable at ${BASE} (HTTP ${CODE})"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "BASE=${BASE%/}" >> "$GITHUB_ENV"
              # Export for upload-evidence.sh, which reads $DEVAUDIT_BASE_URL directly.
              echo "DEVAUDIT_BASE_URL=${BASE%/}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::DevAudit base URL ${BASE} returned HTTP ${CODE}. Likely a stale alias or wrong host. Check sdlc-config.json devaudit.base_url."
              exit 1
              ;;
          esac

      - name: Determine release version
        id: version
        if: steps.resolve.outputs.skip != 'true'
        run: |
          # Release identity is the REQ tag on the latest commit
          # ([REQ-XXX] in subject, Ref: REQ-XXX in body), with a bare-date
          # fallback for housekeeping commits. Both this workflow and
          # ci.yml call the same helper so a single feature converges on
          # one release record regardless of whether the push touched
          # code or docs. See DevAudit #310.
          chmod +x scripts/derive-release-version.sh 2>/dev/null || true
          VERSION=$(./scripts/derive-release-version.sh)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      # Housekeeping artefact auto-generation (DevAudit-Installer#116 WS3+WS4)
      #
      # Housekeeping releases (bare-date version) need two operator-authored
      # artefacts to clear the portal's release-completeness checklist:
      # `RELEASE-TICKET-<version>.md` and `security-summary-<version>.md`.
      # When the version resolves to a bare-date AND those artefacts don't
      # already exist on develop, generate stubs from the CI gate JSON and
      # open a PR that the operator reviews + signs off + merges. Once
      # merged, the next compliance-evidence.yml run uploads them as
      # evidence and the matrix flips both items to Ō£ō.
      #
      # Mirrors the `incident-export.yml` pattern: auto-PR, operator fills
      # in sign-off, merge to land.
      - name: Auto-generate housekeeping stubs (if needed)
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.DEVAUDIT_USER_TOKEN || github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Guard: only fire for bare-date (housekeeping) versions.
          if ! [[ "$VERSION" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "Version ${VERSION} is not housekeeping; skipping stub generation."
            exit 0
          fi
          TICKET_PATH="compliance/pending-releases/RELEASE-TICKET-${VERSION}.md"
          SECSUM_PATH="compliance/security-summary-${VERSION}.md"
          # Skip when both stubs already exist (this branch already carries
          # them, or a prior run already opened the PR and the artefacts
          # have since merged).
          if [ -f "$TICKET_PATH" ] && [ -f "$SECSUM_PATH" ]; then
            echo "Housekeeping stubs already present for ${VERSION}; nothing to generate."
            exit 0
          fi
          chmod +x scripts/generate-housekeeping-release-ticket.sh 2>/dev/null || true
          chmod +x scripts/generate-security-summary.sh 2>/dev/null || true
          mkdir -p compliance/pending-releases
          # Generate any missing stubs. Each generator is independent so a
          # partial-state branch (e.g. ticket already merged but security-
          # summary still missing) only writes the missing half.
          if [ ! -f "$TICKET_PATH" ]; then
            bash scripts/generate-housekeeping-release-ticket.sh "$VERSION" > "$TICKET_PATH"
            echo "Wrote $TICKET_PATH"
          fi
          if [ ! -f "$SECSUM_PATH" ]; then
            bash scripts/generate-security-summary.sh "$VERSION" > "$SECSUM_PATH"
            echo "Wrote $SECSUM_PATH"
          fi
          # Open the auto-PR. force-with-lease so re-runs on the same
          # bare-date version update the same branch in place.
          BRANCH="chore/housekeeping-release-${VERSION}"
          git config user.name 'devaudit-bot'
          git config user.email 'devaudit-bot@users.noreply.github.com'
          git fetch origin develop
          git checkout -B "${BRANCH}" origin/develop
          # Re-write under the new branch (the checkout above resets the
          # working tree ŌĆö regenerate so the commit captures the stubs).
          if [ ! -f "$TICKET_PATH" ]; then
            bash scripts/generate-housekeeping-release-ticket.sh "$VERSION" > "$TICKET_PATH"
          fi
          if [ ! -f "$SECSUM_PATH" ]; then
            bash scripts/generate-security-summary.sh "$VERSION" > "$SECSUM_PATH"
          fi
          git add "$TICKET_PATH" "$SECSUM_PATH"
          if git diff --cached --quiet; then
            echo "No change ŌĆö stubs already on develop."
            exit 0
          fi
          git commit -m "chore: housekeeping release-ticket stub + security-summary for ${VERSION}" \
            -m "Auto-generated by compliance-evidence.yml (DevAudit-Installer#116)." \
            -m "" \
            -m "REPLACE markers in the Risk Assessment + Sign-off blocks require operator review before merge."
          git push --force-with-lease origin "${BRANCH}"
          EXISTING=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number' || true)
          if [ -z "$EXISTING" ]; then
            gh pr create --base develop --head "${BRANCH}" \
              --title "chore(housekeeping): release-ticket + security-summary stubs for ${VERSION}" \
              --body "Auto-generated by the \`Compliance Evidence Upload\` workflow when develop received a housekeeping push (no \`REQ-XXX\` in commit subjects; version derived as bare-date \`${VERSION}\`).\n\n**Files added:**\n- \`${TICKET_PATH}\` ŌĆö release ticket stub with commit summary + sign-off block\n- \`${SECSUM_PATH}\` ŌĆö security summary stub scraping SAST + dep-audit gate JSON\n\n**Required before merge:**\n- [ ] Replace \`REPLACE ŌĆö ŌĆ”\` markers in the **Summary**, **Risk Assessment**, and **Sign-off** blocks on both files\n- [ ] Confirm the auto-scraped SAST + dep-audit counts match what the gate panel shows\n- [ ] Add reviewer sign-off (operator name + date)\n\nOnce merged, the next \`compliance-evidence.yml\` run uploads both artefacts as evidence and the portal's release-completeness checklist flips the **Security summary present** + **Release ticket present** items to Ō£ō.\n\nSee [stage-3 SDLC doc \"Housekeeping releases\" section](../SDLC/3-compile-evidence.md) for the full operator walkthrough."
          else
            echo "PR #${EXISTING} already open for ${VERSION} ŌĆö branch updated in place."
          fi

      - name: Upload compliance documents
        if: steps.resolve.outputs.skip != 'true'
        run: |
          chmod +x scripts/upload-evidence.sh 2>/dev/null || true
          # Common flags WITHOUT --release. Each upload appends its OWN
          # --release so per-requirement artifacts land in their own release
          # record (version = REQ-ID) instead of all collapsing into whichever
          # single version the triggering commit derived. DevAudit #135 follow-
          # up: this fixes release *attribution* (not just duplication) ŌĆö an
          # untagged docs commit must not sweep every in-scope REQ into a date
          # release. Note: upload-evidence.sh keeps the LAST --release seen.
          FLAGS="--git-sha ${{ github.sha }} --ci-run-id ${{ github.run_id }} --branch ${{ github.ref_name }}"
          FLAGS="${FLAGS} --create-release-if-missing --environment uat"
          DERIVED_RELEASE="${{ steps.version.outputs.version }}"

          # Derive change_type for the bare-date (housekeeping) DERIVED_RELEASE:
          # the prefix of the most recent commit's subject. No-op for tracked
          # releases ŌĆö they get per-REQ derivation in the loop below.
          DERIVED_CT=$(git log -1 --pretty=%s 2>/dev/null \
            | grep -oE '^(feat|fix|refactor|perf|chore|docs|ci|build|test|compliance|revert)' \
            | head -1 || true)
          DERIVED_META=()
          [ -n "$DERIVED_CT" ] && DERIVED_META+=(--change-type "$DERIVED_CT")

          # Upload planning docs (RTM / Test Plan / Test Cases) as
          # compliance_document ŌĆö they surface under the Documents tab.
          for DOC in compliance/RTM.md compliance/test-plan.md compliance/test-cases.md; do
            if [ -f "$DOC" ]; then
              echo "Uploading: $(basename "$DOC")"
              bash scripts/upload-evidence.sh \
                wgb _compliance-docs compliance_document "$DOC" \
                --category planning ${FLAGS} --release "${DERIVED_RELEASE}" \
                "${DERIVED_META[@]}" \
                || echo "Warning: Failed to upload $(basename "$DOC")"
            fi
          done

          # Project-level Test Summary Report ŌĆö a hand-authored baseline
          # describing the project's testing posture. As of v0.1.32 this is
          # uploaded as `compliance_document` (NOT `test_report`) ŌĆö the
          # per-release Test Reports gate is now satisfied by the per-REQ
          # `test-execution-summary.md` uploaded in the in-scope-requirements
          # loop below, which carries fresh release-specific data. The
          # project-level TSR continues to ship as a Documents-tab baseline
          # but no longer poses as per-release test evidence.
          # See DevAudit-Installer#101.
          if [ -f "compliance/test-summary-report.md" ]; then
            echo "Uploading: test-summary-report.md (compliance_document ŌĆö baseline)"
            bash scripts/upload-evidence.sh \
              wgb _compliance-docs compliance_document compliance/test-summary-report.md \
              --category planning ${FLAGS} --release "${DERIVED_RELEASE}" \
              "${DERIVED_META[@]}" \
              || echo "Warning: Failed to upload test-summary-report.md"
          fi

          # Tier 3 per-event governance docs (devaudit#370 Phase 3a, narrowed
          # in v0.1.39). Only periodic-review and incident-report are CI-uploaded
          # ŌĆö both are auto-generated by other workflows (periodic-review by the
          # quarterly cron, incident-report by the incident-export workflow).
          #
          # Tier 1/2 governance docs (Test_Policy, AGENT, INSTRUCTIONS,
          # Test_Strategy, Test_Architecture, Periodic_Security_Review_Schedule,
          # ROPA, DPIA, AI Disclosure) are operator-uploaded via the portal
          # Upload Evidence form. CI auto-upload was removed because placeholder
          # starter content was landing as canonical evidence; the portal form
          # ensures the operator reviews each refresh before it counts.
          upload_governance() {
            local FILE="$1" TYPE="$2"
            if [ ! -f "$FILE" ]; then return 0; fi
            echo "Uploading governance: $(basename "$FILE") (type=${TYPE})"
            bash scripts/upload-evidence.sh \
              wgb _compliance-docs "$TYPE" "$FILE" \
              --category planning ${FLAGS} --release "${DERIVED_RELEASE}" \
              "${DERIVED_META[@]}" \
              || echo "Warning: Failed to upload $(basename "$FILE")"
          }
          # Recognise governance docs at top-level OR under compliance/governance/
          # (operator's choice ŌĆö both layouts are common).
          upload_governance compliance/periodic-review.md             periodic_review
          upload_governance compliance/governance/periodic-review.md  periodic_review
          upload_governance compliance/incident-report.md             incident_report
          upload_governance compliance/governance/incident-report.md  incident_report

          # ŌöĆŌöĆ Audit-log export (DevAudit-Installer#98 WS2) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
          # Snapshot the portal's audit log for the rolling 90-day window
          # and upload as `evidence_type=audit_log`. Closes three
          # framework-coverage clauses on every release:
          #   - ISO27001.A.8.16 ŌĆö Monitoring activities
          #   - EUAIA.Art-12   ŌĆö Record-keeping (automatic logging)
          #   - GDPR.Art-32    ŌĆö Security of processing (audit-log half)
          #
          # The portal endpoint defaults to the last 90 days when no
          # `since`/`until` query params are passed; omit them so the
          # consumer side stays zero-config. Endpoint shipped in
          # META-COMPLY PR #413; project-scoped API key (uploader role)
          # already has read access via `resolveCiUploadAuth`.
          AUDIT_LOG_FILE="$(mktemp -t audit-log-XXXXXX.json)"
          if curl -sSf -H "Authorization: Bearer ${DEVAUDIT_API_KEY}" \
            "${DEVAUDIT_BASE_URL%/}/api/ci/projects/wgb/audit-log/export" \
            -o "$AUDIT_LOG_FILE"; then
            echo "Uploading: audit-log.json (audit_log ŌĆö 90-day window)"
            bash scripts/upload-evidence.sh \
              wgb _compliance-docs audit_log "$AUDIT_LOG_FILE" \
              --category compliance_document ${FLAGS} --release "${DERIVED_RELEASE}" \
              "${DERIVED_META[@]}" \
              || echo "Warning: Failed to upload audit-log.json"
          else
            # Soft-fail: an export hiccup shouldn't break the rest of the
            # evidence pipeline. Surfaces as a warning in the workflow log;
            # the framework-coverage panel will show MISSING for the three
            # clauses above until the next successful upload.
            echo "::warning::Audit-log export failed ŌĆö endpoint unreachable or 4xx/5xx. Three framework-coverage clauses (ISO27001.A.8.16, EUAIA.Art-12, GDPR.Art-32 audit-log half) will stay MISSING until the next run."
          fi
          rm -f "$AUDIT_LOG_FILE"

          # Helper: emit a `--release-title ŌĆ”` `--change-type ŌĆ”` pair for a given
          # REQ, derived from its pending release-ticket H1 and the most recent
          # commit attributed to that REQ. Empty pair when neither is available.
          req_meta_args() {
            local REQ="$1"; local TITLE=""; local CT=""
            for FILE in "compliance/pending-releases/RELEASE-TICKET-${REQ}.md" \
                        "compliance/approved-releases/RELEASE-TICKET-${REQ}.md"; do
              if [ -f "$FILE" ]; then
                TITLE=$(grep -m1 '^# ' "$FILE" \
                  | sed -E 's/^# *(REQ-[0-9]+)?[[:space:]]*[ŌĆö:-]?[[:space:]]*//')
                break
              fi
            done
            CT=$(git log --grep "\[${REQ}\]\|Ref: ${REQ}" --pretty=%s -1 2>/dev/null \
              | grep -oE '^(feat|fix|refactor|perf|chore|docs|ci|build|test|compliance|revert)' \
              | head -1 || true)
            # Use if/then/fi (not `[ ŌĆ” ] && cmd`) ŌĆö under bash -eo pipefail a
            # trailing `[ ŌĆ” ] && cmd` whose test fails returns 1, and the
            # function inherits that exit code; calling via $(req_meta_args ŌĆ”)
            # then aborts the step silently (DevAudit-Installer#77).
            if [ -n "$TITLE" ]; then printf -- '--release-title %q ' "$TITLE"; fi
            if [ -n "$CT" ]; then printf -- '--change-type %q ' "$CT"; fi
          }

          # Upload release tickets (pending only)
          if [ -d "compliance/pending-releases" ]; then
            for TICKET in compliance/pending-releases/*.md; do
              [ -f "$TICKET" ] || continue
              # A RELEASE-TICKET-REQ-XXX.md belongs to that requirement's
              # release record; any other ticket rides the derived release.
              TICKET_BASE=$(basename "$TICKET" .md)
              case "$TICKET_BASE" in
                RELEASE-TICKET-REQ-*)
                  TICKET_REQ="${TICKET_BASE#RELEASE-TICKET-}"
                  TICKET_OWNER="$TICKET_REQ"; TICKET_RELEASE="$TICKET_REQ"
                  TICKET_META_ARGS=$(req_meta_args "$TICKET_REQ") ;;
                *)
                  TICKET_OWNER="_compliance-docs"; TICKET_RELEASE="$DERIVED_RELEASE"
                  TICKET_META_ARGS="" ;;
              esac
              echo "Uploading: $(basename "$TICKET") -> release ${TICKET_RELEASE}"
              eval "bash scripts/upload-evidence.sh \
                wgb \"${TICKET_OWNER}\" compliance_document \"$TICKET\" \
                --category release_artifact ${FLAGS} --release \"${TICKET_RELEASE}\" \
                ${TICKET_META_ARGS}" \
                || echo "Warning: Failed to upload $(basename "$TICKET")"
            done
          fi

          # Upload per-requirement evidence ŌĆö scoped to requirements with a
          # pending release ticket. Without this scoping every historical
          # compliance/evidence/REQ-*/ folder would be re-uploaded on every
          # run, re-populating the release-requirement matrix with the full
          # project catalogue (DevAudit #135, sibling of #133).
          IN_SCOPE_REQS=()
          if [ -d compliance/pending-releases ]; then
            for TICKET in compliance/pending-releases/RELEASE-TICKET-REQ-*.md; do
              [ -f "$TICKET" ] || continue
              REQ_ID=$(basename "$TICKET" .md | sed 's/^RELEASE-TICKET-//')
              IN_SCOPE_REQS+=("$REQ_ID")
            done
          fi

          if [ ${#IN_SCOPE_REQS[@]} -eq 0 ]; then
            echo "No pending release tickets found ŌĆö skipping per-requirement evidence upload"
          else
            echo "In-scope requirements for this release: ${IN_SCOPE_REQS[*]}"
            for REQ_ID in "${IN_SCOPE_REQS[@]}"; do
              REQ_DIR="compliance/evidence/${REQ_ID}/"
              if [ ! -d "$REQ_DIR" ]; then
                echo "Warning: pending ticket for ${REQ_ID} but no ${REQ_DIR} on disk"
                continue
              fi
              REQ_META_ARGS=$(req_meta_args "$REQ_ID")
              for ARTIFACT in "$REQ_DIR"*.md; do
                [ -f "$ARTIFACT" ] || continue
                # Per-REQ test-execution-summary.md is the ISO 29119-3 ┬¦3.5.6
                # Test Completion Report for THIS release cycle (populated by
                # the e2e-test-engineer skill in Stage 3 ŌĆö scope, results, AC
                # mapping, defects). Upload as `test_report` so it satisfies
                # the portal's Test Reports gate with per-release evidence
                # instead of the project-level evergreen TSR (which from
                # v0.1.32 downgrades to `compliance_document`). See
                # DevAudit-Installer#101.
                BASENAME=$(basename "$ARTIFACT")
                if [ "$BASENAME" = "test-execution-summary.md" ] || [ "$BASENAME" = "test-summary-report.md" ]; then
                  EVTYPE=test_report
                  EVCAT=test_report
                else
                  EVTYPE=compliance_document
                  EVCAT=planning
                fi
                echo "Uploading: ${REQ_ID}/${BASENAME} (${EVTYPE})"
                eval "bash scripts/upload-evidence.sh \
                  wgb \"${REQ_ID}\" ${EVTYPE} \"$ARTIFACT\" \
                  --category ${EVCAT} ${FLAGS} --release \"${REQ_ID}\" \
                  ${REQ_META_ARGS}" \
                  || echo "Warning: Failed to upload ${BASENAME}"
              done
            done
          fi

      - name: Summary
        run: echo "Compliance evidence uploaded for ${{ steps.version.outputs.version }}"
