# E2E Regression — three-tier gating model.
#
# PROJECT-OWNED workflow — NOT generated by DevAudit. `devaudit update` only
# writes its own generated set and removes a fixed legacy list, so this file
# survives syncs. (Don't rename it to a DevAudit-generated name.)
#
# Three-tier gating model (devaudit v0.1.53 — see SDLC/Test_Strategy.md
# § "E2E gating model — three tiers"):
#
#   - smoke      — runs on develop push via ci.yml (no change here, ~3-5 min)
#   - critical   — Playwright project selecting e2e/smoke/ + e2e/critical/
#                  (this workflow on PR-to-main, ~10-15 min target)
#   - regression — all e2e/**/*.spec.ts (this workflow on push-to-main +
#                  manual dispatch, ~35 min with auto-issue on post-merge failure)
#
# The PR-to-main path runs the critical tier so velocity isn't blocked on
# the full regression suite. The post-merge path runs full regression
# against main + auto-files a `bug, priority:high` issue on failure — the
# safety net that catches anything the critical tier let through.
#
# Mirrors ci.yml's Mongo service + seed step so the authenticated suite has
# the admins/menu/inventory it needs. Seed creds match scripts/seed-e2e-admins.ts;
# the disposable CI Mongo makes hardcoded test creds safe.

name: E2E Regression

on:
  workflow_dispatch:
    inputs:
      specs:
        description: 'Space-separated spec paths or --grep pattern. Empty = full regression. Used during fix-and-verify iterations to keep the loop fast (~5 min vs ~35 min).'
        required: false
        type: string
        default: ''
  # PR-to-main runs the critical tier (smoke + e2e/critical/), targeting
  # ~10-15 min wall-clock per the 3-tier model. Push-to-main runs the
  # full regression project for the post-merge safety net; manual dispatch
  # supports intentional operator-triggered full or scoped regression runs.
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  issues: write # post-merge auto-issue on regression failure

jobs:
  e2e-regression:
    name: E2E Regression Suite
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: wawagardenbar_test
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      E2E_ADMIN_USERNAME: e2e-admin
      E2E_ADMIN_PASSWORD: E2eTest@2026!
      E2E_SUPER_ADMIN_USERNAME: e2e-superadmin
      E2E_SUPER_ADMIN_PASSWORD: E2eTest@2026!
      E2E_CSR_USERNAME: e2e-csr
      E2E_CSR_PASSWORD: E2eTest@2026!
      # REQ-074 — skip real SMS/email dispatch in sendPinAction so the
      # customer passwordless PIN-login flow completes in CI. The PIN is
      # persisted to Mongo; specs read it back via getVerificationPinByPhone.
      ENABLE_E2E_PIN_INTERCEPT: 'true'
      # REQ-069 webhook specs sign synthetic payloads against these
      # secrets; without them the signature comparison crashes
      # server-side and the spec sees 500 instead of 401. Repo secrets
      # set by operator (Settings → Secrets → Actions); must match the
      # UAT server's values to keep parity.
      MONNIFY_SECRET_KEY: ${{ secrets.MONNIFY_SECRET_KEY }}
      PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
      INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for E2E_NEW_SPECS computation (origin-tag captures
          # which specs were added in this PR/push so evidence shots tag
          # them as `origin: 'feature'` vs accumulating `regression`).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium 2>/dev/null || npx playwright install chromium

      - name: Seed test database (admins + menu + inventory + fixtures)
        run: |
          npx tsx scripts/seed-e2e-admins.ts
          npx tsx scripts/seed-food-menu.ts
          npx tsx scripts/seed-drinks-menu.ts
          npx tsx scripts/seed-inventory.ts
          # Non-empty initial state for tests that depend on existing
          # records (snapshot list/detail, expenses-search clearing).
          npx tsx scripts/seed-e2e-fixtures.ts

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      # Decide which Playwright project to run based on the trigger.
      # PR-to-main runs `critical` (~10-15 min); push-to-main runs
      # `regression` (~35 min full pack); workflow_dispatch runs
      # regression with optional spec filter for scoped iteration.
      #
      # Fallback: if the `critical` project isn't defined in
      # playwright.config.ts (e.g. during migration), fall back to `smoke`
      # so PR-to-main stays green. Detected via a simple grep of the
      # config file.
      - name: Determine E2E project + spec selector
        id: select
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          case "$EVENT" in
            pull_request)
              if grep -qE "name:\s*['\"]critical['\"]" playwright.config.ts 2>/dev/null; then
                echo "project=critical" >> "$GITHUB_OUTPUT"
                echo "Using critical-tier project (smoke + e2e/critical/)"
              else
                echo "project=smoke" >> "$GITHUB_OUTPUT"
                echo "::warning::No 'critical' Playwright project defined; falling back to smoke."
              fi
              echo "specs=" >> "$GITHUB_OUTPUT"
              ;;
            push)
              echo "project=regression" >> "$GITHUB_OUTPUT"
              echo "specs=" >> "$GITHUB_OUTPUT"
              echo "Running full regression project"
              ;;
            workflow_dispatch)
              echo "project=regression" >> "$GITHUB_OUTPUT"
              echo "specs=${{ github.event.inputs.specs }}" >> "$GITHUB_OUTPUT"
              if [ -n "${{ github.event.inputs.specs }}" ]; then
                echo "Scoped dispatch: ${{ github.event.inputs.specs }}"
              fi
              ;;
          esac

      - name: E2E Regression Tests
        env:
          PLAYWRIGHT_HTML_REPORTER_OPEN: never
          PLAYWRIGHT_JSON_OUTPUT_NAME: e2e-regression-results.json
        run: |
          set -euo pipefail
          PROJECT="${{ steps.select.outputs.project }}"
          SPECS="${{ steps.select.outputs.specs }}"
          if [ -n "$SPECS" ]; then
            echo "::notice::Running scoped regression — project=$PROJECT specs=$SPECS"
            # shellcheck disable=SC2086
            npx playwright test --project="$PROJECT" --reporter=json,html $SPECS
          else
            echo "::notice::Running project=$PROJECT"
            npx playwright test --project="$PROJECT" --reporter=json,html
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: e2e-regression-report
          path: |
            e2e-regression-results.json
            playwright-report/
            # Playwright writes per-test traces, videos, screenshots and
            # error-context.md to test-results/<spec>-<title>[-retry<N>]/
            # — spec-named, unlike playwright-report/data/<hash>.zip. Include
            # them so failed-test triage doesn't need to walk the hash index
            # in the HTML report: `npx playwright show-trace
            # test-results/<spec-test>/trace.zip` resolves the failure in one
            # step. Storage cost is a duplicate of the data already in
            # playwright-report/data/, accepted for the debuggability win.
            test-results/
          retention-days: 30

      # ─────────────────────────────────────────────────────────────────
      # Post-merge auto-issue on regression failure (push:branches:[main])
      #
      # The 3-tier model's safety net: catches regressions that slipped
      # past the critical-tier PR gate. Opens a `bug, priority:high`
      # issue tagging the merge commit + the failing specs so the
      # operator can triage within working hours.
      #
      # No auto-revert — that's intentionally an operator decision per
      # the framework. False positives + flakes + UAT-data drift are
      # real classes; the operator handles each individually (hotfix,
      # revert, or accept-with-recorded-rationale).
      # ─────────────────────────────────────────────────────────────────
      - name: Open hotfix issue on post-merge regression
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MERGE_SHA="${{ github.sha }}"
          MERGE_SHA_SHORT=$(echo "$MERGE_SHA" | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Extract failing spec names from the JSON reporter output if available.
          FAILING=""
          if [ -f e2e-regression-results.json ]; then
            FAILING=$(jq -r '
              [.. | objects | select(.status == "failed" or .status == "timedOut") | .title // empty]
              | unique | .[]
            ' e2e-regression-results.json 2>/dev/null | head -20 || true)
          fi
          if [ -z "$FAILING" ]; then
            FAILING="(see the failing run logs — could not parse spec titles from reporter output)"
          fi

          BODY=$(cat <<EOF
          ## Post-merge regression caught on \`main\`

          The full regression suite failed on the post-merge run for commit \`${MERGE_SHA_SHORT}\`. The critical-tier PR gate let this slip through.

          **Failing specs (best-effort extracted from the JSON reporter):**

          \`\`\`
          ${FAILING}
          \`\`\`

          **Triage actions:**

          - [ ] Read the run log: ${RUN_URL}
          - [ ] Pull \`e2e-regression-report\` artifact from the run; inspect \`test-results/<spec>/error-context.md\` for page state at failure
          - [ ] Decide: hotfix on \`main\`, revert \`${MERGE_SHA_SHORT}\`, or accept-with-rationale if the failure is environmental
          - [ ] If the failing spec is a Must-tier candidate that should have caught this pre-merge, move it from \`e2e/\` to \`e2e/critical/\` so the next PR-to-main runs it

          **Auto-filed by:** \`e2e-regression.yml\` (devaudit#152 3-tier gating, v0.1.53+)
          EOF
          )

          gh issue create \
            --title "[hotfix] Post-merge regression on \`${MERGE_SHA_SHORT}\` — full E2E failed" \
            --body "$BODY" \
            --label "bug,priority:high"
