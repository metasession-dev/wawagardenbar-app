# Feature-branch in-scope E2E (DEVAUDIT-003, issue #174)
#
# Generated by `devaudit install` / `devaudit update` from sdlc-config.json.
# Runs the E2E specs tagged with the branch's REQ on PRs to the integration
# branch, so regression-tier bugs surface during the feature cycle instead of
# at the release gate. Uploads the report as stage-2, origin=feature evidence
# so it does NOT co-mingle with the stage-3/5 regression runs and is NOT
# counted as release/UAT evidence by the portal.
name: Feature In-Scope E2E

on:
  pull_request:
    branches: [develop]

jobs:
  detect-req:
    name: Detect REQ from branch
    if: ${{ !startsWith(github.head_ref, 'chore/close-out-') }}
    runs-on: ubuntu-latest
    outputs:
      req_id: ${{ steps.detect.outputs.req_id }}
      has_tests: ${{ steps.detect.outputs.has_tests }}
    steps:
      - uses: actions/checkout@v6
      - name: Parse REQ from branch name
        id: detect
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ $BRANCH =~ (REQ-[0-9]+) ]]; then
            REQ_ID="${BASH_REMATCH[1]}"
            echo "req_id=$REQ_ID" >> "$GITHUB_OUTPUT"
            if grep -rl "@requirement $REQ_ID" e2e/ --include="*.spec.ts" >/dev/null 2>&1; then
              echo "has_tests=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_tests=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "req_id=none" >> "$GITHUB_OUTPUT"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

  run-feature-e2e:
    name: Run in-scope E2E
    needs: detect-req
    if: needs.detect-req.outputs.has_tests == 'true'
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_DB_NAME: wawagardenbar_test
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      DEVAUDIT_BASE_URL_VAR: ${{ vars.DEVAUDIT_BASE_URL }}
      DEVAUDIT_API_KEY: ${{ secrets.DEVAUDIT_API_KEY }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies (skip if lockfile unchanged)
        run: |
          LOCK_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          if [ -f node_modules/.lock-hash ] && [ "$(cat node_modules/.lock-hash)" = "$LOCK_HASH" ]; then
            echo "node_modules up to date — skipping npm ci"
          else
            npm ci
            echo "$LOCK_HASH" > node_modules/.lock-hash
          fi
      - name: Install Playwright (skip if already cached)
        run: npx playwright install --with-deps chromium 2>/dev/null || npx playwright install chromium

      - name: Set database URI from dynamic port
        run: |
          DB_PORT="${{ job.services.mongodb.ports['27017:27017'] }}"
          echo "MONGODB_WAWAGARDENBAR_APP_URI=mongodb://localhost:${DB_PORT}" >> "$GITHUB_ENV"
          echo "Database on port: ${DB_PORT}"
      - name: E2E setup
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_test
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: E2eTest@2026!
          E2E_SUPER_ADMIN_USERNAME: e2e-superadmin
          E2E_SUPER_ADMIN_PASSWORD: E2eTest@2026!
          E2E_CSR_USERNAME: e2e-csr
          E2E_CSR_PASSWORD: E2eTest@2026!
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          MONNIFY_SECRET_KEY: ${{ secrets.MONNIFY_SECRET_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          ENABLE_E2E_PIN_INTERCEPT: true
        run: |
          npx tsx scripts/seed-e2e-admins.ts
          npx tsx scripts/seed-food-menu.ts
          npx tsx scripts/seed-drinks-menu.ts
          npx tsx scripts/seed-inventory.ts

      - name: Kill stale dev server
        run: lsof -ti:3000 | xargs kill -9 2>/dev/null || true

      - name: Start dev server
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_test
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: E2eTest@2026!
          E2E_SUPER_ADMIN_USERNAME: e2e-superadmin
          E2E_SUPER_ADMIN_PASSWORD: E2eTest@2026!
          E2E_CSR_USERNAME: e2e-csr
          E2E_CSR_PASSWORD: E2eTest@2026!
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          MONNIFY_SECRET_KEY: ${{ secrets.MONNIFY_SECRET_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          ENABLE_E2E_PIN_INTERCEPT: true
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      # Compute the set of e2e spec files added on this branch (relative
      # to the merge base). The evidenceShot helper reads E2E_NEW_SPECS
      # at capture time and tags each screenshot `origin=feature` when
      # its spec appears in the list, else `origin=regression`.
      - name: Compute new-spec list for E2E origin tagging
        run: |
          BASE_REF="${{ github.base_ref || 'develop' }}"
          BASE_SHA=$(git merge-base "origin/${BASE_REF}" HEAD 2>/dev/null || git rev-parse HEAD)
          NEW_SPECS=$(git diff --name-only --diff-filter=A "${BASE_SHA}...HEAD" \
            -- 'tests/e2e/**/*.spec.ts' 'tests/e2e/**/*.spec.tsx' \
               'e2e/**/*.spec.ts' 'e2e/**/*.spec.tsx' 2>/dev/null || true)
          {
            echo "E2E_NEW_SPECS<<EOF"
            echo "$NEW_SPECS"
            echo "EOF"
          } >> "$GITHUB_ENV"
          if [ -n "$NEW_SPECS" ]; then
            echo "New e2e specs on this branch (origin=feature for captures):"
            echo "$NEW_SPECS" | sed 's/^/  /'
          else
            echo "No new e2e specs detected — all captures will tag origin=regression."
          fi

      - name: Register feature release and start feature E2E cycle
        id: cycle
        if: always()
        run: |
          REQ_ID="${{ needs.detect-req.outputs.req_id }}"
          : > "$GITHUB_OUTPUT"
          CONFIG_URL=""
          if [ -f sdlc-config.json ]; then
            CONFIG_URL=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          fi
          BASE="${CONFIG_URL:-$DEVAUDIT_BASE_URL_VAR}"
          if [ -z "$BASE" ] || [ -z "$DEVAUDIT_API_KEY" ]; then
            echo "::warning::DevAudit not configured — skipping feature E2E cycle lifecycle."
            echo "cycle_supported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export DEVAUDIT_BASE_URL="${BASE%/}"
          chmod +x scripts/upload-evidence.sh scripts/report-test-cycle.sh 2>/dev/null || true
          bash scripts/upload-evidence.sh \
            wgb _compliance-docs release_registration README.md \
            --release "$REQ_ID" --create-release-if-missing \
            --environment uat --category planning \
            --git-sha "${{ github.event.pull_request.head.sha }}" \
            --branch "${{ github.head_ref }}" || true
          bash scripts/report-test-cycle.sh start \
            --project-slug wgb \
            --release "$REQ_ID" \
            --sdlc-stage 2 \
            --environment uat \
            --cycle-kind e2e \
            --provider github_actions \
            --external-run-id "${{ github.run_id }}" \
            --external-run-attempt "${{ github.run_attempt }}" \
            --idempotency-key "github:${{ github.repository }}:feature-in-scope-e2e.e2e:${{ github.run_id }}:${{ github.run_attempt }}:2:${REQ_ID}" \
            --commit-sha "${{ github.event.pull_request.head.sha }}" \
            --branch "${{ github.head_ref }}" \
            --workflow-name "Feature In-Scope E2E" \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --output-file "$GITHUB_OUTPUT"

      - name: Run in-scope E2E
        env:
          PLAYWRIGHT_HTML_REPORTER_OPEN: never
          PLAYWRIGHT_JSON_OUTPUT_NAME: e2e-results.json
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_test
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: E2eTest@2026!
          E2E_SUPER_ADMIN_USERNAME: e2e-superadmin
          E2E_SUPER_ADMIN_PASSWORD: E2eTest@2026!
          E2E_CSR_USERNAME: e2e-csr
          E2E_CSR_PASSWORD: E2eTest@2026!
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          MONNIFY_SECRET_KEY: ${{ secrets.MONNIFY_SECRET_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          ENABLE_E2E_PIN_INTERCEPT: true
        run: |
          REQ_ID="${{ needs.detect-req.outputs.req_id }}"
          npx playwright test --grep "$REQ_ID" --reporter=json,html
      - name: Upload feature E2E evidence (stage 2, origin=feature)
        if: always()
        run: |
          REQ_ID="${{ needs.detect-req.outputs.req_id }}"
          CONFIG_URL=""
          if [ -f sdlc-config.json ]; then
            CONFIG_URL=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          fi
          BASE="${CONFIG_URL:-$DEVAUDIT_BASE_URL_VAR}"
          if [ -z "$BASE" ] || [ -z "$DEVAUDIT_API_KEY" ]; then
            echo "::warning::DevAudit not configured — skipping feature E2E upload."
            exit 0
          fi
          export DEVAUDIT_BASE_URL="${BASE%/}"
          LINEAGE_FLAGS=(--test-cycle "${{ github.run_id }}")
          if [ "${{ steps.cycle.outputs.cycle_supported }}" = "true" ] && [ -n "${{ steps.cycle.outputs.cycle_record_id }}" ]; then
            LINEAGE_FLAGS+=(--evidence-scope cycle --test-cycle-record-id "${{ steps.cycle.outputs.cycle_record_id }}")
          fi

          # The portal parses REQ/AC annotations from the JSON reporter
          # output, not from the HTML report ZIP. This is the canonical
          # machine-readable proof for the targeted feature E2E cycle.
          if [ ! -f e2e-results.json ]; then
            echo "::error::Feature E2E produced no e2e-results.json for ${REQ_ID}."
            exit 1
          fi
          bash scripts/upload-evidence.sh \
            wgb "$REQ_ID" e2e_result e2e-results.json \
            --category e2e_result --release "$REQ_ID" --create-release-if-missing \
            --environment uat --sdlc-stage 2 \
            --git-sha "${{ github.event.pull_request.head.sha }}" \
            --ci-run-id "${{ github.run_id }}" --branch "${{ github.head_ref }}" \
            "${LINEAGE_FLAGS[@]}" \
            --meta-key "origin=feature"

          if [ -d playwright-report ]; then
            zip -qr playwright-report.zip playwright-report/ 2>/dev/null || true
          fi
          if [ -f playwright-report.zip ]; then
            bash scripts/upload-evidence.sh \
              wgb "$REQ_ID" feature_e2e_report playwright-report.zip \
              --category e2e_report --release "$REQ_ID" --create-release-if-missing \
              --environment uat --sdlc-stage 2 \
              --git-sha "${{ github.event.pull_request.head.sha }}" \
              --ci-run-id "${{ github.run_id }}" --branch "${{ github.head_ref }}" \
              "${LINEAGE_FLAGS[@]}" \
              --meta-key "origin=feature" \
              || echo "::warning::feature E2E report upload failed"
          fi

          # A Playwright report proves execution, but it is not behavioural
          # evidence a UAT reviewer can inspect inline. Upload every explicit
          # evidenceShot capture as first-class image evidence for this REQ.
          # Do not allow a successful feature E2E cycle to silently omit it.
          shopt -s nullglob
          SHOTS=("compliance/evidence/${REQ_ID}/screenshots/"*.png)
          if [ "${#SHOTS[@]}" -eq 0 ]; then
            echo "::error::No evidenceShot screenshots were captured for ${REQ_ID}."
            exit 1
          fi

          for PNG in "${SHOTS[@]}"; do
            ORIGIN_FLAGS=(--meta-key "origin=feature")
            if [ -f "${PNG}.meta.json" ]; then
              ORIGIN=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('origin','feature'))" "${PNG}.meta.json")
              ORIGIN_FLAGS=(--meta-key "origin=${ORIGIN}")
            fi
            bash scripts/upload-evidence.sh \
              wgb "$REQ_ID" screenshot "$PNG" \
              --category screenshot --release "$REQ_ID" --create-release-if-missing \
              --environment uat --sdlc-stage 2 \
              --git-sha "${{ github.event.pull_request.head.sha }}" \
              --ci-run-id "${{ github.run_id }}" --branch "${{ github.head_ref }}" \
              "${LINEAGE_FLAGS[@]}" "${ORIGIN_FLAGS[@]}"
          done
          shopt -u nullglob

      - name: Complete feature E2E cycle
        if: always()
        run: |
          if [ "${{ steps.cycle.outputs.cycle_supported }}" != "true" ] || [ -z "${{ steps.cycle.outputs.cycle_record_id }}" ]; then
            exit 0
          fi
          CONFIG_URL=""
          if [ -f sdlc-config.json ]; then
            CONFIG_URL=$(jq -r '.devaudit.base_url // empty' sdlc-config.json 2>/dev/null || true)
          fi
          BASE="${CONFIG_URL:-$DEVAUDIT_BASE_URL_VAR}"
          if [ -z "$BASE" ] || [ -z "$DEVAUDIT_API_KEY" ]; then
            exit 0
          fi
          case "${{ job.status }}" in
            success)   OUTCOME=passed ;;
            cancelled) OUTCOME=cancelled ;;
            *)         OUTCOME=failed ;;
          esac
          export DEVAUDIT_BASE_URL="${BASE%/}"
          chmod +x scripts/report-test-cycle.sh 2>/dev/null || true
          bash scripts/report-test-cycle.sh complete \
            --project-slug wgb \
            --release "${{ needs.detect-req.outputs.req_id }}" \
            --sdlc-stage 2 \
            --environment uat \
            --cycle-kind e2e \
            --provider github_actions \
            --external-run-id "${{ github.run_id }}" \
            --external-run-attempt "${{ github.run_attempt }}" \
            --idempotency-key "github:${{ github.repository }}:feature-in-scope-e2e.e2e:${{ github.run_id }}:${{ github.run_attempt }}:2:${{ needs.detect-req.outputs.req_id }}" \
            --commit-sha "${{ github.event.pull_request.head.sha }}" \
            --branch "${{ github.head_ref }}" \
            --workflow-name "Feature In-Scope E2E" \
            --workflow-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --started-at "${{ steps.cycle.outputs.cycle_started_at }}" \
            --outcome "$OUTCOME"
