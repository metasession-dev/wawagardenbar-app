# Post-deploy production verification (read-only)
#
# Generated by sync-sdlc.sh from sdlc-config.json.
# Do not edit manually — re-run the sync script to regenerate.
#
# Production verification is READ-ONLY.
# No E2E tests, no database operations, no API mutations.

name: Post-Deploy Production Evidence

on:
  push:
    branches: [main]

jobs:
  production-evidence:
    name: Production Evidence
    runs-on: self-hosted
    env:
      SUPABASE_URL: ${{ secrets.META_COMPLY_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.META_COMPLY_SERVICE_ROLE_KEY }}
      PROD_URL: ${{ secrets.WAWAGARDENBAR_PROD_URL }}
      PROJECT_SLUG: wawagardenbar-app
      GIT_SHA: ${{ github.sha }}
      CI_RUN: ${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: |
          DATE_PREFIX="v$(date +%Y.%m.%d)"
          # Find the latest release for today (supports multiple releases per day)
          PROJECT_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.${PROJECT_SLUG}&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$PROJECT_ID" ]; then
            EXISTING=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJECT_ID}&version=like.${DATE_PREFIX}%25&select=version&order=created_at.desc&limit=1" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
            VERSION=$(echo "$EXISTING" | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi
          if [ -z "$VERSION" ]; then
            VERSION="${DATE_PREFIX}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Wait for production deployment
        run: |
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/" || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Production is up (HTTP ${HTTP_CODE})"
              break
            fi
            echo "Attempt ${i}/30: HTTP ${HTTP_CODE} — waiting 10s..."
            sleep 10
          done

      - name: Production smoke tests (read-only)
        run: |
          echo "=== Production Smoke Tests ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/")
          echo "Health check: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Production health check failed"
            exit 1
          fi
          curl -s -I "${PROD_URL}/" | grep -iE 'x-frame-options|x-content-type|strict-transport|content-security' || true
          echo "=== Smoke Tests Passed ==="
          cat > prod-smoke-results.json << RESULTS_EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "production_url": "${PROD_URL}",
            "git_sha": "${GIT_SHA}",
            "tests": [
              {"name": "health_check", "status": "passed"},
              {"name": "security_headers", "status": "checked"}
            ]
          }
          RESULTS_EOF

      - name: Upload production evidence
        if: env.SUPABASE_URL != ''
        run: |
          chmod +x scripts/upload-evidence.sh 2>/dev/null || true
          VERSION="${{ steps.version.outputs.version }}"
          FLAGS="--release ${VERSION} --create-release-if-missing --environment production --category ci_pipeline"
          FLAGS="${FLAGS} --git-sha ${GIT_SHA} --ci-run-id ${CI_RUN} --branch main"
          if [ -f prod-smoke-results.json ]; then
            bash scripts/upload-evidence.sh \
              "${PROJECT_SLUG}" "_compliance-docs" "test_report" prod-smoke-results.json \
              ${FLAGS} || echo "Warning: Failed to upload smoke results"
          fi

      - name: Mark release as released
        if: env.SUPABASE_URL != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PROJECT_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.${PROJECT_SLUG}&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          RELEASE_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJECT_ID}&version=eq.${VERSION}&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -n "$RELEASE_ID" ]; then
            curl -s -o /dev/null -w "Release: HTTP %{http_code}\n" \
              -X PATCH "${SUPABASE_URL}/rest/v1/compliance_releases?id=eq.${RELEASE_ID}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"status": "released"}'
            echo "Release ${VERSION} marked as released"
          fi
