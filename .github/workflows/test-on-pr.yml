name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: TypeScript Compilation
  # Runs on: push to develop + PR to main
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # JOB 2: SAST Scan (Semgrep)
  # Runs on: PR to main only
  # Independent security evidence
  # ──────────────────────────────────────────────
  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep
      - run: semgrep scan --config auto app/ lib/ services/ models/ --severity ERROR --severity WARNING --error
      - name: Save SAST results
        if: always()
        run: semgrep scan --config auto app/ lib/ services/ models/ --json > sast-results.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-results
          path: sast-results.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 3: Dependency Audit
  # Runs on: PR to main only
  # Independent supply chain evidence
  # ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run dependency audit
        run: |
          # xlsx (SheetJS) has known high-severity vulnerabilities with no fix available.
          # Accepted risk: used for report CSV/Excel exports only, not user-facing input parsing.
          # See: GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9
          npm audit --audit-level=high 2>&1 | tee audit-output.txt || true
          # Fail only if there are high/critical vulnerabilities OTHER than xlsx
          if npm audit --audit-level=high --json 2>/dev/null | grep -q '"name":"xlsx"'; then
            TOTAL=$(npm audit --audit-level=high --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(len([v for v in d.get('vulnerabilities',{}).values() if v.get('severity') in ('high','critical') and v.get('name') != 'xlsx']))" 2>/dev/null || echo "0")
            if [ "$TOTAL" = "0" ]; then
              echo "::warning::xlsx has known unfixable vulnerabilities (accepted risk). No other high/critical issues found."
              exit 0
            fi
          fi
          npm audit --audit-level=high
      - name: Save audit results
        if: always()
        run: npm audit --json > dependency-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit
          path: dependency-audit.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 4: E2E Tests (Playwright)
  # Runs on: push to develop + PR to main
  # Independent functional test evidence
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typecheck]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: wawagardenbar_test
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      SESSION_COOKIE_NAME: wawa_session
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright E2E tests
        id: e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 90

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.e2e.outcome }}';
            const icon = outcome === 'success' ? ':white_check_mark:' : ':x:';
            const status = outcome === 'success' ? 'passed' : 'failed';
            const body = `## ${icon} E2E Test Results\n\n` +
              `**Status:** Tests ${status}\n` +
              `**Project:** chromium (unauthenticated)\n` +
              `**Commit:** \`${context.sha.substring(0, 7)}\`\n\n` +
              (outcome !== 'success'
                ? '> Download the Playwright report artifact for details.\n'
                : '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
