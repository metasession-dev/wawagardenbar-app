# CI Pipeline — all gates on every push to develop
#
# On develop push: all gates run + evidence is uploaded to META-COMPLY (environment=uat)
# On PR to main: gates are skipped if the same commit already passed on develop

name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 0: Check if develop CI already passed this commit
  # ──────────────────────────────────────────────
  check-develop-ci:
    name: Check Prior CI
    runs-on: self-hosted
    outputs:
      run_gates: ${{ steps.check.outputs.run_gates }}
    steps:
      - name: Check for existing successful develop CI
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push event — gates must run"
            echo "run_gates=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHA="${{ github.event.pull_request.head.sha }}"
          echo "Checking for successful develop CI on SHA: ${SHA}"

          SUCCESSFUL=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${SHA}&event=push&status=success" \
            --jq '[.workflow_runs[] | select(.name == "CI Pipeline")] | length' 2>/dev/null || echo "0")

          if [ "$SUCCESSFUL" -gt 0 ]; then
            echo "Develop CI already passed on this SHA — skipping gate re-run"
            echo "run_gates=false" >> "$GITHUB_OUTPUT"

            for CHECK_NAME in "TypeScript Check" "SAST Scan" "Dependency Audit" "E2E Tests" "Build Check"; do
              gh api "repos/${{ github.repository }}/statuses/${SHA}" \
                -f state=success \
                -f context="${CHECK_NAME}" \
                -f description="Verified by develop CI (same SHA)" \
                2>/dev/null || echo "Warning: Failed to post status for ${CHECK_NAME}"
            done
          else
            echo "No prior successful develop CI found — running gates"
            echo "run_gates=true" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────
  # JOB 1: TypeScript Compilation
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: self-hosted
    needs: [check-develop-ci]
    if: needs.check-develop-ci.outputs.run_gates == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # JOB 2: SAST Scan (Semgrep)
  # ──────────────────────────────────────────────
  sast:
    name: SAST Scan
    runs-on: self-hosted
    needs: [check-develop-ci]
    if: needs.check-develop-ci.outputs.run_gates == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep
      - name: Run SAST scan
        run: |
          semgrep scan --config auto app/ lib/ services/ models/ \
            --severity ERROR --severity WARNING \
            --json > sast-results.json 2>&1 || true
          # Count high/critical findings (WARNING and ERROR severity)
          FINDINGS=$(python3 -c "
          import json
          with open('sast-results.json') as f:
            data = json.load(f)
          results = data.get('results', [])
          print(len(results))
          " 2>/dev/null || echo "0")
          echo "SAST findings: $FINDINGS"
          # Display human-readable output
          semgrep scan --config auto app/ lib/ services/ models/ \
            --severity ERROR --severity WARNING || true
          if [ "$FINDINGS" -gt 0 ]; then
            echo "::warning::$FINDINGS SAST finding(s) detected. Review sast-results.json artifact."
          fi
          # Gate: fail if NEW findings introduced (compare against baseline of 6 pre-existing findings)
          # Pre-existing findings documented in compliance/evidence/sast-baseline.md
          BASELINE=6
          if [ "$FINDINGS" -gt "$BASELINE" ]; then
            echo "::error::New SAST findings detected ($FINDINGS > baseline $BASELINE). Fix before merging."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: sast-results
          path: sast-results.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 3: Dependency Audit
  # ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: self-hosted
    needs: [check-develop-ci]
    if: needs.check-develop-ci.outputs.run_gates == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run dependency audit
        run: |
          # Run audit and capture JSON output
          npm audit --json > audit-full.json 2>&1 || true
          # Count high/critical vulnerabilities excluding accepted risks
          # xlsx (SheetJS): known high-severity, no fix available, used for exports only
          # See: GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9
          UNACCEPTED=$(python3 -c "
          import json
          with open('audit-full.json') as f:
            data = json.load(f)
          accepted = {'xlsx'}
          vulns = data.get('vulnerabilities', {})
          issues = [name for name, v in vulns.items()
                    if v.get('severity') in ('high', 'critical')
                    and name not in accepted]
          print(len(issues))
          for name in issues:
            print(f'  - {name}: {vulns[name].get(\"severity\")}')
          " 2>/dev/null || echo "unknown")
          echo "Unaccepted high/critical vulnerabilities: $UNACCEPTED"
          # Show human-readable audit
          npm audit --audit-level=high 2>&1 || true
          # Gate: fail only if unaccepted vulnerabilities exist
          if [ "$UNACCEPTED" != "0" ] && [ "$UNACCEPTED" != "unknown" ]; then
            echo "::error::$UNACCEPTED unaccepted high/critical vulnerability(ies) found. Fix before merging."
            exit 1
          fi
          if [ "$UNACCEPTED" = "0" ]; then
            echo "::warning::xlsx has known unfixable vulnerabilities (accepted risk). No other high/critical issues."
          fi
      - name: Save audit results
        if: always()
        run: npm audit --json > dependency-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: dependency-audit
          path: dependency-audit.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 4: E2E Tests (Playwright)
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted
    needs: [check-develop-ci]
    if: needs.check-develop-ci.outputs.run_gates == 'true'

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: wawagardenbar_test
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      SESSION_COOKIE_NAME: wawa_session
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright E2E tests
        id: e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 90

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.e2e.outcome }}';
            const icon = outcome === 'success' ? ':white_check_mark:' : ':x:';
            const status = outcome === 'success' ? 'passed' : 'failed';
            const body = `## ${icon} E2E Test Results\n\n` +
              `**Status:** Tests ${status}\n` +
              `**Project:** chromium (unauthenticated)\n` +
              `**Commit:** \`${context.sha.substring(0, 7)}\`\n\n` +
              (outcome !== 'success'
                ? '> Download the Playwright report artifact for details.\n'
                : '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ──────────────────────────────────────────────
  # JOB 5: Build Check
  # ──────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: self-hosted
    needs: [check-develop-ci]
    if: needs.check-develop-ci.outputs.run_gates == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_placeholder
          SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
          SESSION_COOKIE_NAME: wawa_session
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

  # ──────────────────────────────────────────────
  # JOB 6: Upload Evidence to META-COMPLY
  # Runs on: push to develop only (after all gates pass)
  # Uploads gate results tagged with release + environment=uat
  # ──────────────────────────────────────────────
  upload-evidence:
    name: Upload Evidence
    runs-on: self-hosted
    needs: [check-develop-ci, typecheck, sast, dependency-audit, e2e-tests, build]
    if: always() && github.event_name == 'push' && !contains(needs.*.result, 'failure')
    env:
      SUPABASE_URL: ${{ secrets.META_COMPLY_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.META_COMPLY_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Determine release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: v${VERSION}"

      - name: Create release in META-COMPLY (if not exists)
        if: env.SUPABASE_URL != ''
        run: |
          # Look up project ID
          PROJECT_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.wawagardenbar-app&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

          if [ -z "$PROJECT_ID" ]; then
            echo "Warning: Project 'wawagardenbar-app' not found — skipping release creation"
            exit 0
          fi

          # Check if release already exists
          EXISTING=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_releases?project_id=eq.${PROJECT_ID}&version=eq.${{ steps.version.outputs.version }}&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          if echo "$EXISTING" | grep -q '"id"'; then
            echo "Release ${{ steps.version.outputs.version }} already exists"
          else
            echo "Creating release ${{ steps.version.outputs.version }}"
            curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${SUPABASE_URL}/rest/v1/compliance_releases" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{
                \"project_id\": \"${PROJECT_ID}\",
                \"version\": \"${{ steps.version.outputs.version }}\",
                \"branch\": \"${{ github.ref_name }}\",
                \"status\": \"draft\"
              }"
          fi

      - name: Download META-COMPLY upload script
        run: |
          curl -sL "https://raw.githubusercontent.com/metasession-dev/META-COMPLY/sdlc-v1.0.0/scripts/upload-evidence.sh" -o /tmp/upload-evidence.sh
          chmod +x /tmp/upload-evidence.sh

      # Generate evidence files directly (avoids GitHub artifact storage quota)
      - name: Generate gate evidence
        run: |
          mkdir -p ci-evidence
          pip install semgrep 2>/dev/null || true

          echo "Generating SAST results..."
          semgrep scan --config auto app/ lib/ services/ models/ --json > ci-evidence/sast-results.json 2>/dev/null || echo '{"results":[]}' > ci-evidence/sast-results.json

          echo "Generating dependency audit..."
          npm audit --json > ci-evidence/dependency-audit.json 2>/dev/null || echo '{"vulnerabilities":{}}' > ci-evidence/dependency-audit.json

          echo "Generating E2E results placeholder..."
          echo '{"note": "E2E results from gate job — see playwright-report artifact"}' > ci-evidence/e2e-results.json

      - name: Upload evidence to META-COMPLY
        if: env.SUPABASE_URL != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GIT_SHA="${{ github.sha }}"
          CI_RUN="${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"

          # Upload generated evidence files
          for FILE in ci-evidence/*; do
            [ -f "$FILE" ] || continue
            FILENAME=$(basename "$FILE")
            echo "Uploading ${FILENAME}..."
            /tmp/upload-evidence.sh \
              "wawagardenbar-app" \
              "_compliance-docs" \
              "compliance_document" \
              "$FILE" \
              --release "$VERSION" \
              --environment "uat" \
              --category "ci_pipeline" \
              --git-sha "$GIT_SHA" \
              --ci-run-id "$CI_RUN" \
              --branch "$BRANCH" || echo "Warning: Failed to upload ${FILENAME}"
          done

          # Upload compliance documents
          for DOC in compliance/RTM.md compliance/test-plan.md compliance/test-cases.md compliance/test-summary-report.md; do
            if [ -f "$DOC" ]; then
              echo "Uploading compliance doc: $(basename "$DOC")"
              /tmp/upload-evidence.sh \
                "wawagardenbar-app" \
                "_compliance-docs" \
                "compliance_document" \
                "$DOC" \
                --release "$VERSION" \
                --environment "uat" \
                --category "planning" \
                --git-sha "$GIT_SHA" \
                --ci-run-id "$CI_RUN" \
                --branch "$BRANCH" || echo "Warning: Failed to upload $(basename "$DOC")"
            fi
          done

      - name: Summary
        run: echo "All gates passed. Evidence uploaded for ${{ steps.version.outputs.version }} (UAT)."
