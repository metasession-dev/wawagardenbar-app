# CI Pipeline — all gates on every code push to develop
#
# Generated by sync-sdlc.sh from sdlc-config.json.
# Do not edit manually — re-run the sync script to regenerate.
#
# PRs to main inherit commit status via branch protection.
# No pull_request trigger — avoids duplicate CI runs.

name: CI Pipeline

on:
  push:
    branches: [develop]
    paths-ignore:
      - '.github/workflows/**'
      - 'SDLC/**'
      - 'compliance/**'
      - '*.md'
      - '.cursorrules'
      - '.windsurfrules'
      - 'sdlc-config.json'
      - 'scripts/upload-evidence.sh'
      - 'scripts/validate-compliance-artifacts.sh'
      - 'scripts/validate-commits.sh'
      - 'scripts/check-requirement-jsdoc.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: TypeScript Compilation
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # JOB 2: SAST Scan (Semgrep)
  # ──────────────────────────────────────────────
  sast:
    name: SAST Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep
      - name: Run SAST scan
        run: |
          semgrep scan --config auto app/ lib/ services/ models/ \
            --severity ERROR --severity WARNING \
            --json > sast-results.json 2>&1 || true
          FINDINGS=$(python3 -c "
          import json
          with open('sast-results.json') as f:
            data = json.load(f)
          results = data.get('results', [])
          print(len(results))
          " 2>/dev/null || echo "0")
          echo "SAST findings: $FINDINGS"
          semgrep scan --config auto app/ lib/ services/ models/ \
            --severity ERROR --severity WARNING || true
          if [ "$FINDINGS" -gt 0 ]; then
            echo "::warning::$FINDINGS SAST finding(s) detected."
          fi
          BASELINE=6
          if [ "$FINDINGS" -gt "$BASELINE" ]; then
            echo "::error::New SAST findings ($FINDINGS > baseline $BASELINE)."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: sast-results
          path: sast-results.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 3: Dependency Audit
  # ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run dependency audit
        run: |
          npm audit --json > audit-full.json 2>&1 || true
          ACCEPTED="xlsx"
          UNACCEPTED=$(python3 -c "
          import json
          with open('audit-full.json') as f:
            data = json.load(f)
          accepted = set('${ACCEPTED}'.split()) if '${ACCEPTED}' else set()
          vulns = data.get('vulnerabilities', {})
          issues = [name for name, v in vulns.items()
                    if v.get('severity') in ('high', 'critical')
                    and name not in accepted]
          print(len(issues))
          for name in issues:
            print(f'  - {name}: {vulns[name].get(\"severity\")}')
          " 2>/dev/null || echo "unknown")
          echo "Unaccepted high/critical: $UNACCEPTED"
          npm audit --audit-level=high 2>&1 || true
          if [ "$UNACCEPTED" != "0" ] && [ "$UNACCEPTED" != "unknown" ]; then
            echo "::error::$UNACCEPTED unaccepted high/critical vulnerability(ies)."
            exit 1
          fi
      - name: Save audit results
        if: always()
        run: npm audit --json > dependency-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: dependency-audit
          path: dependency-audit.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 4: E2E Tests (Playwright)
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017

    env:
      MONGODB_DB_NAME: wawagardenbar_test
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_COOKIE_NAME: wawa_session
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2


    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium

      - name: Set database URI from dynamic port
        run: |
          DB_PORT="${{ job.services.mongodb.ports['27017'] }}"
          echo "MONGODB_WAWAGARDENBAR_APP_URI=mongodb://localhost:${DB_PORT}" >> "$GITHUB_ENV"
          echo "Database on port: ${DB_PORT}"

      - name: Start dev server
        run: npm run dev &
      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000
      - name: Run E2E tests
        id: e2e
        run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 5: Build Check
  # ──────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          MONGODB_DB_NAME: wawagardenbar_placeholder
          MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SESSION_COOKIE_NAME: wawa_session
          SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2

  # ──────────────────────────────────────────────
  # JOB 6: Upload Evidence to META-COMPLY
  # ──────────────────────────────────────────────
  upload-evidence:
    name: Upload Evidence
    runs-on: self-hosted
    needs: [typecheck, sast, dependency-audit, e2e-tests, build]
    if: ${{ !failure() && !cancelled() }}
    env:
      SUPABASE_URL: ${{ secrets.META_COMPLY_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.META_COMPLY_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: |
          VERSION="v$(date +%Y.%m.%d)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Sync known requirements from RTM
        if: env.SUPABASE_URL != ''
        run: |
          if [ -f "compliance/RTM.md" ]; then
            REQS=$(grep -oP 'REQ-\d+' compliance/RTM.md | sort -t- -k2 -n -u)
            if [ -n "$REQS" ]; then
              JSON_ARRAY="["
              FIRST=true
              for REQ in $REQS; do
                [ "$FIRST" = true ] && FIRST=false || JSON_ARRAY="${JSON_ARRAY},"
                JSON_ARRAY="${JSON_ARRAY}\"${REQ}\""
              done
              JSON_ARRAY="${JSON_ARRAY}]"
              PROJ_ID=$(curl -s "${SUPABASE_URL}/rest/v1/compliance_projects?slug=eq.wawagardenbar-app&select=id" \
                -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              if [ -n "$PROJ_ID" ]; then
                curl -s -o /dev/null -w "known_requirements sync: HTTP %{http_code}\n" \
                  -X PATCH "${SUPABASE_URL}/rest/v1/compliance_projects?id=eq.${PROJ_ID}" \
                  -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                  -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "{\"known_requirements\": ${JSON_ARRAY}}"
                echo "Synced $(echo "$REQS" | wc -w) requirements from RTM.md"
              fi
            fi
          fi

      - name: Install tools for evidence generation
        run: |
          pip install semgrep 2>/dev/null || true
        continue-on-error: true

      - name: Generate gate evidence
        run: |
          mkdir -p ci-evidence
          echo "Generating SAST results..."
          semgrep scan --config auto app/ lib/ services/ models/ --json > ci-evidence/sast-results.json 2>/dev/null || echo '{"results":[]}' > ci-evidence/sast-results.json
          echo "Generating dependency audit..."
          npm audit --json > ci-evidence/dependency-audit.json 2>/dev/null || echo '{"vulnerabilities":{}}' > ci-evidence/dependency-audit.json
          echo "Generating unit test results..."
          npm test -- --json --outputFile=ci-evidence/unit-test-results.json 2>/dev/null || echo '{}' > ci-evidence/unit-test-results.json
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Upload gate evidence and compliance documents
        if: env.SUPABASE_URL != ''
        run: |
          chmod +x scripts/upload-evidence.sh 2>/dev/null || true
          FLAGS="--git-sha ${{ github.sha }} --ci-run-id ${{ github.run_id }} --branch ${{ github.ref_name }}"
          FLAGS="${FLAGS} --release ${{ steps.version.outputs.version }} --create-release-if-missing"
          FLAGS="${FLAGS} --environment uat"

          # Upload gate evidence (SAST, dep audit, unit tests)
          for FILE in ci-evidence/*; do
            [ -f "$FILE" ] || continue
            FILENAME=$(basename "$FILE")
            echo "Uploading gate evidence: ${FILENAME}"
            bash scripts/upload-evidence.sh \
              wawagardenbar-app _compliance-docs audit_log "$FILE" \
              --category ci_pipeline ${FLAGS} || echo "Warning: Failed to upload ${FILENAME}"
          done

          # Upload compliance docs
          for DOC in compliance/RTM.md compliance/test-plan.md compliance/test-cases.md compliance/test-summary-report.md; do
            if [ -f "$DOC" ]; then
              echo "Uploading: $(basename "$DOC")"
              bash scripts/upload-evidence.sh \
                wawagardenbar-app _compliance-docs compliance_document "$DOC" \
                --category planning ${FLAGS} || echo "Warning: Failed to upload $(basename "$DOC")"
            fi
          done

          # Upload release tickets
          for DIR in compliance/pending-releases compliance/approved-releases; do
            if [ -d "$DIR" ]; then
              for TICKET in "$DIR"/*.md; do
                [ -f "$TICKET" ] || continue
                echo "Uploading: $(basename "$TICKET")"
                bash scripts/upload-evidence.sh \
                  wawagardenbar-app _compliance-docs compliance_document "$TICKET" \
                  --category release_artifact ${FLAGS} || echo "Warning: Failed to upload $(basename "$TICKET")"
              done
            fi
          done

          # Upload per-requirement evidence (test-scope, test-plan, impl-plan, execution summary, etc.)
          for REQ_DIR in compliance/evidence/REQ-*/; do
            [ -d "$REQ_DIR" ] || continue
            REQ_ID=$(basename "$REQ_DIR")
            for ARTIFACT in "$REQ_DIR"*.md; do
              [ -f "$ARTIFACT" ] || continue
              echo "Uploading: ${REQ_ID}/$(basename "$ARTIFACT")"
              bash scripts/upload-evidence.sh \
                wawagardenbar-app "${REQ_ID}" compliance_document "$ARTIFACT" \
                --category planning ${FLAGS} || echo "Warning: Failed to upload $(basename "$ARTIFACT")"
            done
          done

      - name: Summary
        run: echo "Evidence uploaded for ${{ steps.version.outputs.version }} (UAT)"

  # ──────────────────────────────────────────────
  # JOB 7: Compliance Validation
  # ──────────────────────────────────────────────
  compliance-validation:
    name: Compliance Validation
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate compliance artifacts
        run: bash scripts/validate-compliance-artifacts.sh origin/main
      - name: Validate commit conventions
        run: bash scripts/validate-commits.sh origin/main
