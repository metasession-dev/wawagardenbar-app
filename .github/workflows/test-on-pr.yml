# CI Pipeline — all gates on every push to develop
#
# PRs to main inherit commit status via branch protection required status checks.
# No pull_request trigger needed — avoids duplicate CI runs.

name: CI Pipeline

on:
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: TypeScript Compilation
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # JOB 2: SAST Scan (Semgrep)
  # ──────────────────────────────────────────────
  sast:
    name: SAST Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep
      - name: Run SAST scan
        run: |
          semgrep scan --config auto app/ lib/ services/ models/ \
            --severity ERROR --severity WARNING \
            --json > sast-results.json 2>&1 || true
          # Count high/critical findings (WARNING and ERROR severity)
          FINDINGS=$(python3 -c "
          import json
          with open('sast-results.json') as f:
            data = json.load(f)
          results = data.get('results', [])
          print(len(results))
          " 2>/dev/null || echo "0")
          echo "SAST findings: $FINDINGS"
          # Display human-readable output
          semgrep scan --config auto app/ lib/ services/ models/ \
            --severity ERROR --severity WARNING || true
          if [ "$FINDINGS" -gt 0 ]; then
            echo "::warning::$FINDINGS SAST finding(s) detected. Review sast-results.json artifact."
          fi
          # Gate: fail if NEW findings introduced (compare against baseline of 6 pre-existing findings)
          # Pre-existing findings documented in compliance/evidence/sast-baseline.md
          BASELINE=6
          if [ "$FINDINGS" -gt "$BASELINE" ]; then
            echo "::error::New SAST findings detected ($FINDINGS > baseline $BASELINE). Fix before merging."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: sast-results
          path: sast-results.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 3: Dependency Audit
  # ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run dependency audit
        run: |
          # Run audit and capture JSON output
          npm audit --json > audit-full.json 2>&1 || true
          # Count high/critical vulnerabilities excluding accepted risks
          # xlsx (SheetJS): known high-severity, no fix available, used for exports only
          # See: GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9
          UNACCEPTED=$(python3 -c "
          import json
          with open('audit-full.json') as f:
            data = json.load(f)
          accepted = {'xlsx'}
          vulns = data.get('vulnerabilities', {})
          issues = [name for name, v in vulns.items()
                    if v.get('severity') in ('high', 'critical')
                    and name not in accepted]
          print(len(issues))
          for name in issues:
            print(f'  - {name}: {vulns[name].get(\"severity\")}')
          " 2>/dev/null || echo "unknown")
          echo "Unaccepted high/critical vulnerabilities: $UNACCEPTED"
          # Show human-readable audit
          npm audit --audit-level=high 2>&1 || true
          # Gate: fail only if unaccepted vulnerabilities exist
          if [ "$UNACCEPTED" != "0" ] && [ "$UNACCEPTED" != "unknown" ]; then
            echo "::error::$UNACCEPTED unaccepted high/critical vulnerability(ies) found. Fix before merging."
            exit 1
          fi
          if [ "$UNACCEPTED" = "0" ]; then
            echo "::warning::xlsx has known unfixable vulnerabilities (accepted risk). No other high/critical issues."
          fi
      - name: Save audit results
        if: always()
        run: npm audit --json > dependency-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: dependency-audit
          path: dependency-audit.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # JOB 4: E2E Tests (Playwright)
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017

    env:
      MONGODB_DB_NAME: wawagardenbar_test
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      SESSION_COOKIE_NAME: wawa_session
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Set MongoDB URI from dynamic port
        run: |
          MONGO_PORT="${{ job.services.mongodb.ports['27017'] }}"
          echo "MONGODB_WAWAGARDENBAR_APP_URI=mongodb://localhost:${MONGO_PORT}" >> "$GITHUB_ENV"
          echo "MongoDB service on port: ${MONGO_PORT}"

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright E2E tests
        id: e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 90

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.e2e.outcome }}';
            const icon = outcome === 'success' ? ':white_check_mark:' : ':x:';
            const status = outcome === 'success' ? 'passed' : 'failed';
            const body = `## ${icon} E2E Test Results\n\n` +
              `**Status:** Tests ${status}\n` +
              `**Project:** chromium (unauthenticated)\n` +
              `**Commit:** \`${context.sha.substring(0, 7)}\`\n\n` +
              (outcome !== 'success'
                ? '> Download the Playwright report artifact for details.\n'
                : '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  # ──────────────────────────────────────────────
  # JOB 5: Build Check
  # ──────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: wawagardenbar_placeholder
          SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
          SESSION_COOKIE_NAME: wawa_session
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3000/api

  # ──────────────────────────────────────────────
  # JOB 6: Upload Evidence to META-COMPLY
  # Uses META-COMPLY's reusable workflow with date-based versioning.
  # Auto-creates release, uploads compliance docs, syncs requirements.
  # ──────────────────────────────────────────────
  upload-evidence:
    needs: [typecheck, sast, dependency-audit, e2e-tests, build]
    if: ${{ !failure() && !cancelled() }}
    uses: metasession-dev/META-COMPLY/.github/workflows/upload-evidence.yml@main
    with:
      project-slug: wawagardenbar-app
      release-version: v${{ github.run_number }}
      environment: uat
    secrets:
      SUPABASE_URL: ${{ secrets.META_COMPLY_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.META_COMPLY_SERVICE_ROLE_KEY }}

  # ──────────────────────────────────────────────
  # JOB 7: Compliance Validation (PRs to main only)
  # Validates commit conventions and compliance artifacts
  # ──────────────────────────────────────────────
  compliance-validation:
    name: Compliance Validation
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate compliance artifacts
        run: bash scripts/validate-compliance-artifacts.sh origin/main
      - name: Validate commit conventions
        run: bash scripts/validate-commits.sh origin/main
