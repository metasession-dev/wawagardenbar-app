name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_WAWAGARDENBAR_APP_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: wawagardenbar_test
      SESSION_PASSWORD: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      SESSION_COOKIE_NAME: wawa_session
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright E2E tests
        id: e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.e2e.outcome }}';
            const icon = outcome === 'success' ? ':white_check_mark:' : ':x:';
            const status = outcome === 'success' ? 'passed' : 'failed';
            const body = `## ${icon} E2E Test Results\n\n` +
              `**Status:** Tests ${status}\n` +
              `**Project:** chromium (unauthenticated)\n` +
              `**Commit:** \`${context.sha.substring(0, 7)}\`\n\n` +
              (outcome !== 'success'
                ? '> Download the Playwright report artifact for details.\n'
                : '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
